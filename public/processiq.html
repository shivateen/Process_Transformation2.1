<script>
/* Process Transformation Accelerator — Platform Shell
 * Owns shared state (window.PIQ), the two-level journey router (3 stages × sub-views),
 * the SME "composition" being designed, the global ERP toggle, and cross-pattern
 * helpers (resolve a pattern by id; collect the action blocks of a selection).
 *
 * The three stages mirror the Tiger BPT pipeline:
 *   1 Design          — Missions → Actions (Studio wizard + Pattern Library)
 *   2 Discover & Fit  — process discovery & agent fitment + happy-path agentivisation
 *   3 Run & Govern    — STP on the happy path; variations matched to patterns, routed
 *                       for DAG approval; monitoring + ROI.
 */
(function () {
  "use strict";

  window.PIQ = {
    erp: "sap",
    patterns: window.PROCESSIQ_PATTERNS.patterns,
    meta: window.PROCESSIQ_PATTERNS.meta,
    tax: window.PROCESSIQ_TAXONOMY,
    book: window.PROCESSIQ_PORTFOLIO,
    E: window.ProcessIQEngine,
    modules: {},     // registered by each module file
    active: null,    // current sub-view id
    _erpListeners: [],
    // the process an SME is composing — threaded through all three stages
    composition: {
      fnId: null, procId: null, roleId: null, objId: null,
      patternIds: [],     // selected patterns
      blocks: {},         // blockKey -> { mode:'auto'|'hitl', tech:string, configured:bool }
      live: false,        // promoted to Run & Govern
    },
  };

  /* ---- journey map: 3 stages, each with sub-views ---------------------- */
  var STAGES = [
    { id: "design", n: 1, label: "Design", tag: "Missions → Actions", sub: [
        { id: "studio", label: "Studio" },
        { id: "library", label: "Pattern Library" } ] },
    { id: "fit", n: 2, label: "Discover & Fit", tag: "Discovery & Agent Fitment", sub: [
        { id: "fitment", label: "Agent Fitment" },
        { id: "discovery", label: "Discovery Engine" } ] },
    { id: "run", n: 3, label: "Run & Govern", tag: "Agentic Workflow", sub: [
        { id: "runtime", label: "Live Operations" },
        { id: "cockpit", label: "Cognitive Cockpit" },
        { id: "governance", label: "Governance" },
        { id: "roi", label: "ROI & Attribution" } ] },
  ];
  PIQ.STAGES = STAGES;

  function stageOf(viewId) {
    for (var i = 0; i < STAGES.length; i++) {
      if (STAGES[i].sub.some(function (s) { return s.id === viewId; })) return STAGES[i];
    }
    return null;
  }

  /* ---- shared domain helpers ------------------------------------------- */
  PIQ.onErp = function (fn) { PIQ._erpListeners.push(fn); };

  // resolve a pattern id against the real library first, then sample stubs
  PIQ.pattern = function (id) {
    var p = PIQ.patterns.filter(function (x) { return x.id === id; })[0];
    if (p) return p;
    var s = PIQ.tax.stubPatterns[String(id)];
    return s || null;
  };

  PIQ.selectedPatterns = function () {
    return PIQ.composition.patternIds.map(PIQ.pattern).filter(Boolean);
  };

  PIQ.fn = function () {
    return (PIQ.tax.functions || []).filter(function (f) { return f.id === PIQ.composition.fnId; })[0] || null;
  };
  PIQ.objective = function () {
    var f = PIQ.fn(); var c = PIQ.composition; if (!f) return null;
    var p = f.processes.filter(function (x) { return x.id === c.procId; })[0]; if (!p) return null;
    var r = p.roles.filter(function (x) { return x.id === c.roleId; })[0]; if (!r) return null;
    return r.objectives.filter(function (x) { return x.id === c.objId; })[0] || null;
  };

  // Decompose selected patterns into unique configurable action blocks.
  // Happy-path blocks (originalDAG) are straight-through candidates; variation
  // blocks (branchingDAG actions) carry the HITL flag of their branch.
  PIQ.collectBlocks = function (patternIds) {
    var map = {};   // key -> block
    function touch(token, patId, source, hitl) {
      (token || "").split(" + ").forEach(function (raw) {
        var key = raw.trim(); if (!key) return;
        var b = map[key];
        if (!b) { b = map[key] = { key: key, label: prettify(key), patterns: [], source: source, hitl: !!hitl }; }
        if (b.patterns.indexOf(patId) < 0) b.patterns.push(patId);
        if (source === "happy") b.source = "happy";   // happy wins for labelling STP
        if (hitl) b.hitl = true;
      });
    }
    (patternIds || []).forEach(function (id) {
      var p = PIQ.pattern(id); if (!p) return;
      (p.originalDAG || []).forEach(function (s) { touch(s, id, "happy", false); });
      (p.branchingDAG || []).forEach(function (br) {
        (br.actions || []).forEach(function (a) { touch(a, id, "variation", !!br.hitl); });
      });
    });
    return Object.keys(map).map(function (k) { return map[k]; });
  };

  function prettify(token) {
    return token.replace(/\(/g, " (").replace(/_/g, " ").replace(/\s+/g, " ").trim();
  }
  PIQ.prettify = prettify;

  // deterministic agent-fitment verdict for an action block (used by fitment + runtime)
  PIQ.fitment = function (block) {
    var t = block.key.toLowerCase();
    var human = /legal|cfo|vp|approv|hold|credit_review|write.?off|conditional/.test(t);
    var assisted = block.hitl || /escalate|notify|alert|review|route|propose|request/.test(t);
    if (human) return { tier: "Human-led", score: 0.55, mode: "hitl" };
    if (assisted) return { tier: "Assisted", score: 0.78, mode: "hitl" };
    return { tier: "Full-auto", score: 0.94, mode: "auto" };
  };

  PIQ.resetComposition = function () {
    PIQ.composition = { fnId: null, procId: null, roleId: null, objId: null,
      patternIds: [], blocks: {}, live: false };
  };

  /* ---- router ---------------------------------------------------------- */
  function renderNav() {
    var nav = document.getElementById("modnav");
    var stage = stageOf(PIQ.active);
    nav.innerHTML = "";
    STAGES.forEach(function (st, i) {
      var b = document.createElement("button");
      b.className = "stagetab" + (stage && stage.id === st.id ? " on" : "");
      b.innerHTML = '<span class="stnum">' + st.n + '</span>' +
        '<span class="stlbl">' + st.label + '<small>' + st.tag + '</small></span>';
      b.onclick = function () { go(st.sub[0].id); };
      nav.appendChild(b);
      if (i < STAGES.length - 1) {
        var a = document.createElement("span"); a.className = "stage-arrow"; a.textContent = "→";
        nav.appendChild(a);
      }
    });
  }

  function renderSub() {
    var bar = document.getElementById("subbar");
    var stage = stageOf(PIQ.active);
    if (!stage) { bar.innerHTML = ""; bar.classList.remove("on"); return; }
    bar.classList.add("on");
    var tabs = stage.sub.map(function (s) {
      return '<button class="subtab' + (PIQ.active === s.id ? " on" : "") + '" data-v="' + s.id + '">' + s.label + '</button>';
    }).join("");
    bar.innerHTML = '<div class="subtabs">' + tabs + '</div>' +
      '<div class="crumb">' + crumb() + '</div>';
    bar.querySelectorAll(".subtab").forEach(function (t) {
      t.onclick = function () { go(t.dataset.v); };
    });
  }

  function crumb() {
    var c = PIQ.composition, f = PIQ.fn();
    if (!f) return '<span class="cr-empty">No process selected — start in Studio</span>';
    var parts = [f.name];
    var obj = PIQ.objective();
    if (obj) parts.push(obj.name);
    var n = c.patternIds.length;
    var s = parts.map(function (x) { return '<span>' + esc(x) + '</span>'; }).join('<i>›</i>');
    if (n) s += '<i>›</i><span class="cr-count">' + n + ' pattern' + (n > 1 ? "s" : "") + '</span>';
    if (c.live) s += '<span class="cr-live">● LIVE</span>';
    return s;
  }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function go(id) {
    PIQ.active = id;
    renderNav();
    renderSub();
    var view = document.getElementById("view");
    view.innerHTML = "";
    var mod = PIQ.modules[id];
    if (mod && mod.render) { mod.render(view); }
    else { view.appendChild(stubCard(id)); }
    window.scrollTo(0, 0);
  }
  PIQ.go = go;

  function stubCard(id) {
    var d = document.createElement("div");
    d.className = "modstub";
    d.innerHTML = '<div class="modstub-card"><h2>' + esc(id) + '</h2>' +
      '<p>This view is not yet wired.</p></div>';
    return d;
  }

  /* ---- global ERP toggle ----------------------------------------------- */
  document.getElementById("erpToggle").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    PIQ.erp = b.dataset.erp;
    this.querySelectorAll("button").forEach(function (x) { x.classList.toggle("on", x === b); });
    PIQ._erpListeners.forEach(function (fn) { try { fn(PIQ.erp); } catch (e) {} });
  });

  /* "Why" link → the narrative front door */
  var why = document.getElementById("whyLink");
  if (why) why.onclick = function (e) { e.preventDefault(); go("provocation"); };

  /* boot */
  document.getElementById("varStat").textContent = PIQ.E._money(PIQ.book.meta.valueAtRisk);
  document.getElementById("dateStat").textContent = PIQ.book.meta.asOfDate;

  // Open on the Studio — the SME's front door into the journey.
  PIQ.boot = function () { go("studio"); };
})();

/* Stage 1 · Design — Studio
 * The SME's guided front door: Function → Process → Role → Objective → Patterns →
 * Action Blocks. Picking an objective surfaces the matching patterns (with their
 * DAGs); selecting patterns assembles the union of action blocks; configuring those
 * blocks (technology + auto/HITL mode) hands off to Stage 2 (Discover & Fit).
 *
 * Patterns are the unit of variation handling and dynamic action-block sequencing;
 * the happy path (originalDAG) is the straight-through spine recorded for agentivisation.
 */
(function () {
  "use strict";
  var PRIO = window.PIQ.meta.priorityLegend;

  // step machine
  var STEPS = ["Function", "Process", "Role", "Objective", "Patterns", "Configure"];
  var state = { step: 0 };

  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function C() { return window.PIQ.composition; }

  /* resume at the furthest resolved step when re-entering the Studio */
  function resumeStep() {
    var c = C();
    if (c.patternIds.length) return 5;
    if (c.objId) return 4;
    if (c.roleId) return 3;
    if (c.procId) return 2;
    if (c.fnId) return 1;
    return 0;
  }

  function render(view) {
    state.step = resumeStep();
    view.innerHTML = '<div class="studio"></div>';
    draw(view.querySelector(".studio"));
  }

  function draw(root) {
    root.innerHTML = "";
    root.appendChild(intro());
    root.appendChild(rail());
    var body = el("div", "st-body");
    root.appendChild(body);
    drawStep(body);
  }

  function intro() {
    return el("div", "st-intro",
      '<div><div class="kv">Stage 1 · Design — Missions → Actions</div>' +
      '<h2>Compose a process to transform</h2>' +
      '<p class="st-lede">Pick the mission top-down, choose the behavioural patterns that handle its variations, ' +
      'and configure the action blocks. The accelerator is function-agnostic — start anywhere.</p></div>' +
      '<button class="btn ghost sm" id="stReset">Start over</button>');
  }

  function rail() {
    var done = resumeStep();
    var r = el("div", "st-rail");
    r.innerHTML = STEPS.map(function (s, i) {
      var cls = i === state.step ? "on" : (i < done || isResolved(i) ? "done" : "");
      var reachable = i <= done;
      return '<button class="st-step ' + cls + '" data-i="' + i + '"' + (reachable ? "" : " disabled") + '>' +
        '<span class="st-dot">' + (isResolved(i) && i !== state.step ? "✓" : (i + 1)) + '</span>' +
        '<span class="st-name">' + s + '</span>' + chosen(i) + '</button>';
    }).join('<span class="st-sep"></span>');
    r.querySelectorAll(".st-step").forEach(function (b) {
      if (b.hasAttribute("disabled")) return;
      b.onclick = function () { state.step = +b.dataset.i; redraw(); };
    });
    return r;
  }

  function isResolved(i) {
    var c = C();
    return [!!c.fnId, !!c.procId, !!c.roleId, !!c.objId, c.patternIds.length > 0,
            Object.keys(c.blocks).length > 0][i];
  }
  function chosen(i) {
    var c = C(), f = window.PIQ.fn();
    var label = "";
    if (i === 0 && f) label = f.name;
    else if (i === 1 && f && c.procId) label = (proc() || {}).name;
    else if (i === 2 && c.roleId) label = (role() || {}).name;
    else if (i === 3 && c.objId) label = (window.PIQ.objective() || {}).name;
    else if (i === 4 && c.patternIds.length) label = c.patternIds.length + " selected";
    else if (i === 5 && Object.keys(c.blocks).length) label = Object.keys(c.blocks).length + " configured";
    return label ? '<small class="st-chose">' + esc(label) + '</small>' : "";
  }

  function proc() { var f = window.PIQ.fn(); return f && f.processes.filter(function (p) { return p.id === C().procId; })[0]; }
  function role() { var p = proc(); return p && p.roles.filter(function (r) { return r.id === C().roleId; })[0]; }

  function redraw() { draw(document.querySelector(".studio")); }

  /* ---------------- steps ---------------- */
  function drawStep(body) {
    [stepFunction, stepProcess, stepRole, stepObjective, stepPatterns, stepConfigure][state.step](body);
    var rb = document.getElementById("stReset");
    if (rb) rb.onclick = function () { window.PIQ.resetComposition(); state.step = 0; redraw(); };
  }

  function pickGrid(items, build, onPick) {
    var g = el("div", "pickgrid");
    items.forEach(function (it) {
      var card = el("div", "pickcard", build(it));
      card.onclick = function () { onPick(it); };
      g.appendChild(card);
    });
    return g;
  }

  function stepFunction(body) {
    body.appendChild(el("div", "st-q", "Which <b>function</b> are you transforming?"));
    var grid = pickGrid(window.PIQ.tax.functions, function (f) {
      var on = C().fnId === f.id;
      return '<div class="pc-ico" style="--ac:' + f.accent + '">' + f.icon + '</div>' +
        '<div class="pc-main"><div class="pc-t">' + esc(f.name) +
        ' <span class="pc-tag">' + esc(f.short) + '</span></div>' +
        '<div class="pc-d">' + esc(f.tagline) + '</div></div>' +
        '<div class="pc-meta"><span class="pc-n">' + f.patternCount + '</span> patterns ' +
        '<span class="statusbadge ' + f.status + '">' + (f.status === "live" ? "Fully built" : "Sample") + '</span></div>' +
        (on ? '<div class="pc-on">✓</div>' : '');
    }, function (f) {
      var c = C();
      if (c.fnId !== f.id) { c.fnId = f.id; c.procId = c.roleId = c.objId = null; c.patternIds = []; c.blocks = {}; }
      // auto-advance; if function has a single process, pre-select it
      if (f.processes.length === 1) c.procId = f.processes[0].id;
      state.step = f.processes.length === 1 ? 2 : 1;
      redraw();
    });
    body.appendChild(grid);
  }

  function stepProcess(body) {
    var f = window.PIQ.fn(); if (!f) { state.step = 0; return redraw(); }
    body.appendChild(el("div", "st-q", "Which <b>process</b> inside " + esc(f.name) + "?"));
    body.appendChild(pickGrid(f.processes, function (p) {
      var on = C().procId === p.id;
      return '<div class="pc-main"><div class="pc-t">' + esc(p.name) + '</div>' +
        '<div class="pc-d">' + esc(p.desc) + '</div></div>' +
        '<div class="pc-meta">' + p.roles.length + ' roles</div>' + (on ? '<div class="pc-on">✓</div>' : '');
    }, function (p) {
      var c = C(); if (c.procId !== p.id) { c.procId = p.id; c.roleId = c.objId = null; c.patternIds = []; c.blocks = {}; }
      state.step = 2; redraw();
    }));
  }

  function stepRole(body) {
    var p = proc(); if (!p) { state.step = 1; return redraw(); }
    body.appendChild(el("div", "st-q", "Whose <b>role</b> are we augmenting?"));
    body.appendChild(pickGrid(p.roles, function (r) {
      var on = C().roleId === r.id;
      var objs = r.objectives.map(function (o) { return o.name; }).join(" · ");
      return '<div class="pc-main"><div class="pc-t">' + esc(r.name) + '</div>' +
        '<div class="pc-d">' + esc(objs) + '</div></div>' +
        '<div class="pc-meta">' + r.objectives.length + ' objectives</div>' + (on ? '<div class="pc-on">✓</div>' : '');
    }, function (r) {
      var c = C(); if (c.roleId !== r.id) { c.roleId = r.id; c.objId = null; c.patternIds = []; c.blocks = {}; }
      state.step = 3; redraw();
    }));
  }

  function stepObjective(body) {
    var r = role(); if (!r) { state.step = 2; return redraw(); }
    body.appendChild(el("div", "st-q", "What <b>objective</b> should the agents pursue?"));
    body.appendChild(pickGrid(r.objectives, function (o) {
      var on = C().objId === o.id;
      return '<div class="pc-main"><div class="pc-t">' + esc(o.name) + '</div>' +
        '<div class="pc-d">Measured by <b>' + esc(o.kpi) + '</b></div></div>' +
        '<div class="pc-meta"><span class="pc-n">' + o.patternCount + '</span> patterns</div>' +
        (on ? '<div class="pc-on">✓</div>' : '');
    }, function (o) {
      var c = C();
      if (c.objId !== o.id) { c.objId = o.id; c.patternIds = o.patternIds.slice(); c.blocks = {}; }  // pre-select all
      state.step = 4; redraw();
    }));
  }

  function stepPatterns(body) {
    var o = window.PIQ.objective(); if (!o) { state.step = 3; return redraw(); }
    var c = C();
    var pats = o.patternIds.map(window.PIQ.pattern).filter(Boolean);
    body.appendChild(el("div", "st-q",
      "Select the <b>patterns</b> to deploy for “" + esc(o.name) + "”" +
      '<button class="linkbtn" id="stAll">' + (c.patternIds.length === pats.length ? "clear all" : "select all") + '</button>'));
    body.appendChild(el("p", "st-hint",
      "Each pattern encodes the analyst's judgement: a happy path (straight-through) plus a branching DAG that handles the variations. Pick the ones that match how your experts actually work."));

    var grid = el("div", "patgrid");
    pats.forEach(function (p) {
      var sel = c.patternIds.indexOf(p.id) >= 0;
      var branches = (p.branchingDAG || []).length;
      var gates = (p.hitlGates || []).length;
      var flow = (p.originalDAG || []).slice(0, 4).map(function (s) { return '<span class="mini-b">' + esc(window.PIQ.prettify(s)) + '</span>'; }).join('<i>→</i>');
      var card = el("div", "patcard" + (sel ? " sel" : ""),
        '<div class="pat-top"><span class="pat-prio" style="background:' + PRIO[p.priority] + '"></span>' +
        '<div class="pat-n">' + esc(p.name) + (p.sample ? ' <span class="statusbadge sample">sample</span>' : '') + '</div>' +
        '<div class="pat-check">' + (sel ? "✓" : "") + '</div></div>' +
        '<div class="pat-mm">“' + esc(trim(p.mentalModel, 150)) + '”</div>' +
        '<div class="pat-flow"><span class="flab">Happy path</span>' + flow + (p.originalDAG.length > 4 ? '<i>→</i><span class="mini-b more">+' + (p.originalDAG.length - 4) + '</span>' : '') + '</div>' +
        '<div class="pat-foot"><span>' + branches + ' variation branches</span>' +
        '<span>' + (gates ? '🔒 ' + gates + ' HITL gate' + (gates > 1 ? "s" : "") : 'no gates') + '</span></div>');
      card.onclick = function () {
        var i = c.patternIds.indexOf(p.id);
        if (i >= 0) c.patternIds.splice(i, 1); else c.patternIds.push(p.id);
        c.blocks = {};   // selection changed → reconfigure
        redraw();
      };
      grid.appendChild(card);
    });
    body.appendChild(grid);
    body.appendChild(nextBar(c.patternIds.length + " pattern" + (c.patternIds.length !== 1 ? "s" : "") + " selected",
      c.patternIds.length ? "Configure action blocks →" : "", function () { state.step = 5; redraw(); }));

    var all = document.getElementById("stAll");
    if (all) all.onclick = function (e) {
      e.stopPropagation();
      c.patternIds = c.patternIds.length === pats.length ? [] : pats.map(function (p) { return p.id; });
      c.blocks = {}; redraw();
    };
  }

  /* ---- the configurator: the heart of the hand-off to Stage 2 ---- */
  var TECHS = ["LLM Agent", "Email / SMTP", "SAP BAPI/RFC", "Oracle REST", "RPA Bot", "Workflow / BPM", "Webhook / API", "Data Query"];
  function defaultTech(block) {
    var t = block.key.toLowerCase();
    if (/email|smtp|notify|alert|comms/.test(t)) return "Email / SMTP";
    if (/sap|bsid|update_sap|dunning|toggle/.test(t)) return "SAP BAPI/RFC";
    if (/oracle|fusion/.test(t)) return "Oracle REST";
    if (/generate|narrative|propose|classif|estimate|assess/.test(t)) return "LLM Agent";
    if (/escalate|route|approv|review|case/.test(t)) return "Workflow / BPM";
    if (/post|clear|match|reconcile|raise|schedule/.test(t)) return "RPA Bot";
    if (/pull|read|scan|compute|track|fingerprint/.test(t)) return "Data Query";
    return "LLM Agent";
  }

  function stepConfigure(body) {
    var c = C();
    if (!c.patternIds.length) { state.step = 4; return redraw(); }
    var blocks = window.PIQ.collectBlocks(c.patternIds);
    // seed config for any unconfigured block
    blocks.forEach(function (b) {
      if (!c.blocks[b.key]) {
        var fit = window.PIQ.fitment(b);
        c.blocks[b.key] = { mode: fit.mode, tech: defaultTech(b), configured: false };
      }
    });

    var happy = blocks.filter(function (b) { return b.source === "happy"; });
    var vary = blocks.filter(function (b) { return b.source !== "happy"; });
    body.appendChild(el("div", "st-q", "Configure the <b>action blocks</b>"));
    body.appendChild(el("p", "st-hint",
      "These are the atomic actions your selected patterns sequence. Happy-path blocks are straight-through candidates; " +
      "variation blocks fire only when a pattern's branch matches. Set the technology and execution mode for each."));

    body.appendChild(blockGroup("Happy path — straight-through spine", "happy", happy, c));
    body.appendChild(blockGroup("Variation handling — fires on pattern match", "vary", vary, c));

    var nConf = Object.keys(c.blocks).filter(function (k) { return c.blocks[k].configured; }).length;
    body.appendChild(nextBar(nConf + " / " + blocks.length + " blocks configured",
      "Send to Discover & Fit →", function () {
        // mark all touched; commit and advance stage
        blocks.forEach(function (b) { c.blocks[b.key].configured = true; });
        window.PIQ.go("fitment");
      }));
  }

  function blockGroup(title, kind, blocks, c) {
    var g = el("div", "blkgroup k-" + kind);
    if (!blocks.length) return g;
    g.appendChild(el("div", "blk-h", title + ' <span class="blk-c">' + blocks.length + '</span>'));
    var list = el("div", "blklist");
    blocks.forEach(function (b) {
      var cfg = c.blocks[b.key];
      var fit = window.PIQ.fitment(b);
      var row = el("div", "blk" + (cfg.configured ? " done" : ""));
      var techOpts = TECHS.map(function (t) { return '<option' + (t === cfg.tech ? " selected" : "") + '>' + t + '</option>'; }).join("");
      row.innerHTML =
        '<div class="blk-tag k-' + kind + '"></div>' +
        '<div class="blk-main"><div class="blk-name">' + esc(b.label) + '</div>' +
        '<div class="blk-key mono">' + esc(b.key) + '</div>' +
        '<div class="blk-sub">used by ' + b.patterns.length + ' pattern' + (b.patterns.length > 1 ? "s" : "") + (b.hitl ? ' · <span class="blk-hitl">needs approval</span>' : '') + '</div></div>' +
        '<div class="blk-fit"><span class="fitchip f-' + fit.mode + '">' + fit.tier + '</span></div>' +
        '<select class="blk-tech" data-k="' + esc(b.key) + '">' + techOpts + '</select>' +
        '<div class="blk-mode" data-k="' + esc(b.key) + '">' +
          '<button class="mode' + (cfg.mode === "auto" ? " on" : "") + '" data-m="auto">Auto</button>' +
          '<button class="mode' + (cfg.mode === "hitl" ? " on" : "") + '" data-m="hitl">Approval</button></div>';
      list.appendChild(row);
    });
    g.appendChild(list);
    // wiring
    g.querySelectorAll(".blk-tech").forEach(function (s) {
      s.onchange = function () { c.blocks[s.dataset.k].tech = s.value; c.blocks[s.dataset.k].configured = true; markDone(s); };
    });
    g.querySelectorAll(".blk-mode").forEach(function (m) {
      m.onclick = function (e) {
        var b = e.target.closest("[data-m]"); if (!b) return;
        c.blocks[m.dataset.k].mode = b.dataset.m; c.blocks[m.dataset.k].configured = true;
        m.querySelectorAll(".mode").forEach(function (x) { x.classList.toggle("on", x === b); });
        markDone(m);
      };
    });
    return g;
  }
  function markDone(node) { var row = node.closest(".blk"); if (row) row.classList.add("done"); }

  function nextBar(label, cta, onNext) {
    var bar = el("div", "st-next");
    bar.innerHTML = '<span class="nx-label">' + esc(label) + '</span>' +
      (cta ? '<button class="btn go" id="stNext">' + esc(cta) + '</button>' : '');
    var b = bar.querySelector("#stNext"); if (b) b.onclick = onNext;
    return bar;
  }

  function trim(s, n) { s = s || ""; return s.length > n ? s.slice(0, n - 1) + "…" : s; }

  window.PIQ.modules.studio = { render: render };
})();

/* Stage 2 · Discover & Fit — Agent Fitment
 * Takes the composition handed over by the Studio and (a) assesses every action block
 * for agent fitment (Full-auto / Assisted / Human-led), (b) records the happy path and
 * agentivises it as the straight-through spine, and (c) renders the to-be process flow:
 * the happy path with the selected patterns attached as variation handlers.
 *
 * Deterministic: fitment verdicts come from PIQ.fitment; nothing here invents data.
 */
(function () {
  "use strict";
  var PRIO = window.PIQ.meta.priorityLegend;

  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function C() { return window.PIQ.composition; }

  function render(view) {
    var c = C();
    if (!c.patternIds.length) { view.appendChild(empty()); return; }
    var blocks = window.PIQ.collectBlocks(c.patternIds);
    var happy = blocks.filter(function (b) { return b.source === "happy"; });
    var fits = blocks.map(function (b) { return window.PIQ.fitment(b); });
    var dist = { "Full-auto": 0, "Assisted": 0, "Human-led": 0 };
    fits.forEach(function (f) { dist[f.tier]++; });
    var stp = Math.round(100 * dist["Full-auto"] / blocks.length);

    var root = el("div", "fit");
    root.appendChild(head(c, blocks, stp));
    root.appendChild(distBar(dist, blocks.length));
    root.appendChild(fitmentTable(blocks));
    root.appendChild(happyPanel(happy));
    root.appendChild(tobePanel());
    root.appendChild(goLiveBar(stp));
    view.appendChild(root);
    wire(root, happy);
  }

  function empty() {
    var d = el("div", "fit-empty",
      '<div class="kv">Stage 2 · Discover & Fit</div>' +
      '<h2>Nothing composed yet</h2>' +
      '<p>Use the <b>Studio</b> to pick a function, process and patterns. Your selection flows here for agent-fitment assessment and happy-path agentivisation.</p>' +
      '<button class="btn go" id="toStudio">← Go to Studio</button>');
    d.querySelector("#toStudio").onclick = function () { window.PIQ.go("studio"); };
    return d;
  }

  function head(c, blocks, stp) {
    var f = window.PIQ.fn(), o = window.PIQ.objective();
    return el("div", "fit-head",
      '<div><div class="kv">Stage 2 · Discover & Fit — Process discovery & agent fitment</div>' +
      '<h2>' + esc(f.name) + ' › ' + esc(o.name) + '</h2>' +
      '<p class="fit-lede">Every activity in the to-be flow is assessed for agent fit. The happy path is recorded and agentivised; the patterns become the variation handlers.</p></div>' +
      '<div class="fit-kpis">' +
        kpi(c.patternIds.length, "patterns") + kpi(blocks.length, "action blocks") + kpi(stp + "%", "straight-through") +
      '</div>');
  }
  function kpi(v, l) { return '<div class="fkpi"><b>' + v + '</b><span>' + l + '</span></div>'; }

  function distBar(dist, total) {
    var seg = [["Full-auto", "#27ae60"], ["Assisted", "#e67e22"], ["Human-led", "#c0392b"]];
    var bars = seg.filter(function (s) { return dist[s[0]]; }).map(function (s) {
      return '<i style="flex:' + dist[s[0]] + ';background:' + s[1] + '" title="' + s[0] + '"></i>';
    }).join("");
    var legend = seg.map(function (s) {
      return '<span class="dl"><i style="background:' + s[1] + '"></i>' + s[0] + ' · <b>' + dist[s[0]] + '</b></span>';
    }).join("");
    return el("div", "fit-dist",
      '<div class="fd-h">Agent fitment distribution <span class="muted">across ' + total + ' action blocks</span></div>' +
      '<div class="fd-bar">' + bars + '</div><div class="fd-legend">' + legend + '</div>');
  }

  function fitmentTable(blocks) {
    var rows = blocks.map(function (b) {
      var fit = window.PIQ.fitment(b);
      var cfg = (C().blocks[b.key] || {});
      var pct = Math.round(fit.score * 100);
      return '<div class="ftrow">' +
        '<div class="ft-src k-' + (b.source === "happy" ? "happy" : "vary") + '" title="' + (b.source === "happy" ? "happy path" : "variation") + '"></div>' +
        '<div class="ft-name"><b>' + esc(b.label) + '</b><span class="mono">' + esc(b.key) + '</span></div>' +
        '<div class="ft-tech">' + esc(cfg.tech || "—") + '</div>' +
        '<div class="ft-score"><div class="ft-bar"><i style="width:' + pct + '%"></i></div><span>' + pct + '%</span></div>' +
        '<div class="ft-verdict"><span class="fitchip f-' + fit.mode + '">' + fit.tier + '</span></div></div>';
    }).join("");
    return el("div", "fit-table",

/* Stage 3 · Run & Govern — Live Operations
 * The composed process, in production. A deterministic transaction stream flows in:
 *   • clean transactions match the happy path → straight-through, touchless (auto)
 *   • transactions with variation are matched to a pattern's branching DAG → the branch
 *     fires; if the branch carries a HITL gate, DAG approval is sought before execution
 * Live KPIs (STP rate, auto-resolved, pending approvals, value released) update as it runs.
 */
(function () {
  "use strict";
  var PRIO = window.PIQ.meta.priorityLegend;

  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function money(n) { return window.PIQ.E._money(n); }
  function C() { return window.PIQ.composition; }

  var NAMES = ["Halberd Industrial", "Meridian Foods", "Cobalt Retail", "Northwind Mfg",
    "Arcadia Health", "Veritas Logistics", "Sundial CPG", "Orion Components",
    "Lumen Energy", "Pioneer Textiles", "Atlas Freight", "Crest Pharma"];

  var sim = null;     // simulator state (rebuilt when the composition changes)
  var timer = null;

  function pickBranch(p, i) {
    var bs = p.branchingDAG || [];
    if (!bs.length) return -1;
    return i % bs.length;
  }

  function buildSim() {
    var c = C();
    var pats = window.PIQ.selectedPatterns();
    var q = [];
    for (var i = 0; i < 18; i++) {
      var entity = NAMES[i % NAMES.length];
      var amt = 12000 + ((i * 53) % 40) * 2200;   // deterministic spread
      if (i % 3 === 2 && pats.length) {
        var p = pats[i % pats.length];
        var bidx = pickBranch(p, i);
        var br = p.branchingDAG[bidx] || {};
        q.push({ n: i + 1, id: "TXN-" + (10480 + i * 7), entity: entity, amt: amt,
          kind: "variation", patternId: p.id, branchIdx: bidx, needsApproval: !!br.hitl, status: "queued" });
      } else {
        q.push({ n: i + 1, id: "TXN-" + (10480 + i * 7), entity: entity, amt: amt, kind: "clean", status: "queued" });
      }
    }
    return { q: q, cursor: 0, log: [], counts: { stp: 0, auto: 0, pending: 0, approved: 0, rejected: 0, value: 0 } };
  }

  function ensureSim(force) {
    var sig = C().patternIds.join(",") + "|" + Object.keys(C().blocks).length;
    if (force || !sim || sim.sig !== sig) { sim = buildSim(); sim.sig = sig; }
  }

  /* ---------------- render ---------------- */
  function render(view) {
    stopAuto();
    if (!C().patternIds.length) { view.appendChild(empty()); return; }
    ensureSim(false);
    var root = el("div", "rt");
    root.appendChild(head());
    root.appendChild(kpis());
    var grid = el("div", "rt-grid");
    grid.innerHTML = '<div class="rt-stream" id="rtStream"></div>' +
      '<div class="rt-side"><div class="rt-approvals" id="rtApprovals"></div>' +
      '<div class="rt-feed" id="rtFeed"></div></div>';
    root.appendChild(grid);
    view.appendChild(root);
    drawStream(); drawApprovals(); drawFeed(); drawKpis();
    wireControls(root);
  }

  function empty() {
    var d = el("div", "fit-empty",
      '<div class="kv">Stage 3 · Run & Govern</div><h2>No live process</h2>' +
      '<p>Compose a process in the <b>Studio</b> and promote it through <b>Discover & Fit</b> to operate it here.</p>' +
      '<button class="btn go" id="toStudio">← Go to Studio</button>');
    d.querySelector("#toStudio").onclick = function () { window.PIQ.go("studio"); };
    return d;
  }

  function head() {
    var f = window.PIQ.fn(), o = window.PIQ.objective();
    return el("div", "rt-head",
      '<div><div class="kv">Stage 3 · Run & Govern — Agentic workflow in production</div>' +
      '<h2>' + esc(f.name) + ' › ' + esc(o.name) + ' <span class="livedot">● LIVE</span></h2></div>' +
      '<div class="rt-ctrl">' +
        '<button class="btn go sm" id="rtStep">Process next ▸</button>' +
        '<button class="btn sm" id="rtAuto">Auto-run ⏵</button>' +
        '<button class="btn ghost sm" id="rtReset">Reset</button></div>');
  }

  function kpis() {
    return el("div", "rt-kpis", '' +
      kpi("kStp", "0%", "Straight-through") + kpi("kAuto", "0", "Auto-resolved") +
      kpi("kPend", "0", "Pending approval") + kpi("kAppr", "0", "DAG-approved") +
      kpi("kVal", "$0", "Value released"));
  }
  function kpi(id, v, l) { return '<div class="rkpi"><b id="' + id + '">' + v + '</b><span>' + l + '</span></div>'; }

  function drawKpis() {
    var c = sim.counts, done = sim.cursor;
    var stp = done ? Math.round(100 * c.stp / done) : 0;
    set("kStp", stp + "%"); set("kAuto", c.auto); set("kPend", c.pending);
    set("kAppr", c.approved); set("kVal", money(c.value));
  }
  function set(id, v) { var n = document.getElementById(id); if (n) n.textContent = v; }

  function drawStream() {
    var s = document.getElementById("rtStream"); if (!s) return;
    var rows = sim.q.map(function (t) {
      var cls = "rtx s-" + t.status;
      var badge, sub;
      if (t.status === "queued") { badge = '<span class="rtx-b q">queued</span>'; sub = ""; }
      else if (t.kind === "clean") { badge = '<span class="rtx-b stp">STRAIGHT-THROUGH</span>'; sub = "happy path · touchless"; }
      else {
        var p = window.PIQ.pattern(t.patternId);
        var label = p ? p.name : "pattern";
        if (t.status === "pending") badge = '<span class="rtx-b pend">AWAITING DAG APPROVAL</span>';
        else if (t.status === "approved") badge = '<span class="rtx-b appr">APPROVED ✓</span>';
        else if (t.status === "rejected") badge = '<span class="rtx-b rej">REJECTED ✕</span>';
        else badge = '<span class="rtx-b auto">AUTO-RESOLVED</span>';
        sub = 'matched <b>' + esc(label) + '</b>';
      }
      return '<div class="' + cls + '"><div class="rtx-n">' + t.n + '</div>' +
        '<div class="rtx-main"><div class="rtx-id">' + esc(t.id) + ' · ' + esc(t.entity) +
        '<span class="rtx-amt">' + money(t.amt) + '</span></div>' +
        '<div class="rtx-sub">' + sub + '</div></div>' + badge + '</div>';
    }).join("");
    s.innerHTML = '<div class="rt-streamh">Transaction stream <span class="muted">' + sim.cursor + ' / ' + sim.q.length + ' processed</span></div>' + rows;
    var active = s.querySelector(".s-queued");
    if (active && sim.cursor < sim.q.length) active.classList.add("next");
  }

  function drawApprovals() {
    var a = document.getElementById("rtApprovals"); if (!a) return;
    var pend = sim.q.filter(function (t) { return t.status === "pending"; });
    if (!pend.length) { a.innerHTML = '<div class="ap-empty">No approvals pending. Variations with HITL gates land here for sign-off before the DAG executes.</div>'; return; }
    a.innerHTML = '<div class="ap-h">🔒 DAG approvals <span class="ap-c">' + pend.length + '</span></div>' +
      pend.map(function (t) {
        var p = window.PIQ.pattern(t.patternId), br = p.branchingDAG[t.branchIdx];
        return '<div class="apcard" data-n="' + t.n + '">' +
          '<div class="ap-top"><span class="pat-prio" style="background:' + PRIO[p.priority] + '"></span>' +
          esc(p.name) + '<span class="ap-tx">' + esc(t.id) + '</span></div>' +
          '<div class="ap-cond mono">' + esc(br.condition) + '</div>' +
          '<div class="ap-act">→ ' + esc(window.PIQ.prettify((br.actions || []).join(" + "))) + '</div>' +
          '<div class="ap-gate">🔒 ' + esc(br.hitl) + '</div>' +
          '<div class="ap-btns"><button class="btn go xs" data-act="approve" data-n="' + t.n + '">Approve</button>' +
          '<button class="btn ghost xs" data-act="reject" data-n="' + t.n + '">Reject</button></div></div>';
      }).join("");
    a.querySelectorAll("[data-act]").forEach(function (b) {
      b.onclick = function () { decide(+b.dataset.n, b.dataset.act); };
    });
  }

  function drawFeed() {
    var f = document.getElementById("rtFeed"); if (!f) return;
    if (!sim.log.length) { f.innerHTML = '<div class="feed-h">Activity</div><div class="ap-empty">Press <b>Process next</b> or <b>Auto-run</b> to start the stream.</div>'; return; }
    f.innerHTML = '<div class="feed-h">Activity</div>' + sim.log.slice().reverse().map(function (e) {
      return '<div class="feed-i k-' + e.k + '"><span class="fi-dot"></span>' + e.t + '</div>';
    }).join("");
  }

  /* ---------------- engine ---------------- */
  function step() {
    if (sim.cursor >= sim.q.length) { stopAuto(); return false; }
    var t = sim.q[sim.cursor];
    if (t.kind === "clean") {
      t.status = "stp"; sim.counts.stp++; sim.counts.value += Math.round(t.amt * 0.18);
      logE("stp", esc(t.id) + " cleared <b>straight-through</b> on the happy path — no human touch.");
    } else {
      var p = window.PIQ.pattern(t.patternId);
      if (t.needsApproval) {
        t.status = "pending"; sim.counts.pending++;
        logE("pend", esc(t.id) + " matched <b>" + esc(p.name) + "</b> — routed for DAG approval.");
      } else {
        t.status = "auto"; sim.counts.auto++; sim.counts.value += Math.round(t.amt * 0.12);
        logE("auto", esc(t.id) + " matched <b>" + esc(p.name) + "</b> — branch executed automatically.");
      }
    }
    sim.cursor++;
    repaint();
    return true;
  }

  function decide(n, act) {
    var t = sim.q.filter(function (x) { return x.n === n; })[0]; if (!t || t.status !== "pending") return;
    sim.counts.pending--;
    var p = window.PIQ.pattern(t.patternId);
    if (act === "approve") { t.status = "approved"; sim.counts.approved++; sim.counts.value += Math.round(t.amt * 0.12);
      logE("appr", esc(t.id) + " — <b>" + esc(p.name) + "</b> DAG <b>approved</b>; branch executed.");
    } else { t.status = "rejected"; sim.counts.rejected++;
      logE("rej", esc(t.id) + " — <b>" + esc(p.name) + "</b> DAG <b>rejected</b>; held for review.");
    }
    repaint();
  }

  function logE(k, t) { sim.log.push({ k: k, t: t }); }
  function repaint() { drawStream(); drawApprovals(); drawFeed(); drawKpis(); }

  /* ---------------- controls ---------------- */
  function wireControls(root) {
    root.querySelector("#rtStep").onclick = function () { stopAuto(); step(); };
    root.querySelector("#rtAuto").onclick = function () { toggleAuto(this); };
    root.querySelector("#rtReset").onclick = function () { stopAuto(); ensureSim(true); repaint(); };
  }
  function toggleAuto(btn) {
    if (timer) { stopAuto(); btn.textContent = "Auto-run ⏵"; btn.classList.remove("on"); return; }
    btn.textContent = "Pause ⏸"; btn.classList.add("on");
    timer = setInterval(function () { if (!step()) { var b = document.getElementById("rtAuto"); if (b) { b.textContent = "Auto-run ⏵"; b.classList.remove("on"); } } }, 850);
  }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }

  window.PIQ.modules.runtime = { render: render };
  window.PIQ.onErp(function () { if (window.PIQ.active === "runtime") { var v = document.getElementById("view"); v.innerHTML = ""; render(v); } });
})();

/* ProcessIQ — Cognitive Cockpit (Module 3)
 * Renders the Sense->Diagnose->Decide->Act loop + three-layer brain + action DAG
 * for the selected invoice. Registers with the shell as PIQ.modules.cockpit. */
(function () {
  "use strict";
  var E = window.ProcessIQEngine;
  var patterns = window.PIQ.patterns;
  var meta = window.PIQ.meta;
  var book = window.PIQ.book;
  var selected = null;

  function erp() { return window.PIQ.erp; }
  function money(x) { return E._money(x); }
  function el(tag, cls, html) { var n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; }
  function risk(iv) {
    if (!iv.groundTruthFeature) return null;
    var p = patterns.filter(function (x) { return x.featureSlug === iv.groundTruthFeature; })[0];
    return p ? p.priority : "Medium";
  }

  function renderList() {

    var sorted = book.invoices.slice().sort(function (a, b) {

      return (rb.confidence - ra.confidence) || (b.amount - a.amount);
    });
    sorted.forEach(function (iv) {
      var r = E.run(iv, patterns).diagnosis;
      var pr = risk(iv);
      var node = el("div", "inv" + (selected && selected.belnr === iv.belnr ? " sel" : ""));

        : '<span class="riskpill clean">Clean</span>';
      node.innerHTML =
        '<div class="r1"><span class="cust">' + iv.customer + '</span><span class="amt">' + money(iv.amount) + '</span></div>' +
        '<div class="r2"><span class="mono">' + iv.invoiceId + ' · ' + iv.terms + '</span><span class="dpd">' + iv.dpd + ' DPD</span></div>' +
        '<div class="r2" style="margin-top:6px">' + pill +
        (r.fired ? '<span class="mono" style="font-size:11px;color:var(--diag)">' + (r.confidence * 100 | 0) + '% ' + r.top.pattern.name + '</span>' : '<span class="mono" style="font-size:11px">no pattern</span>') +
        '</div>';
      node.onclick = function () { selected = iv; renderList(); renderCockpit(); };
      list.appendChild(node);
    });
  }

  /* ---------- confidence gauge (SVG) ---------- */
  function gauge(pct) {
    var r = 34, c = 2 * Math.PI * r, off = c * (1 - pct);
    var col = pct > 0.85 ? "#8e44ad" : pct > 0.6 ? "#d68910" : "#9aa7b5";
    return '<svg class="gauge" width="92" height="92" viewBox="0 0 92 92">' +
      '<circle cx="46" cy="46" r="' + r + '" fill="none" stroke="#eef2f6" stroke-width="9"/>' +
      '<circle cx="46" cy="46" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="9" stroke-linecap="round" ' +
      'stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 46 46)"/>' +
      '<text x="46" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="' + col + '">' + (pct * 100 | 0) + '</text>' +
      '<text x="46" y="60" text-anchor="middle" font-size="10" fill="#5d6b7d">% CONF</text></svg>';
  }

  /* ---------- main cockpit ---------- */
  function renderCockpit() {
    var c = document.getElementById("cockpit");
    if (!c) return;
    if (!selected) { c.innerHTML = EMPTY; return; }
    var iv = selected;
    var res = E.run(iv, patterns);
    var d = res.diagnosis, dec = res.decision;
    var pat = d.fired ? d.top.pattern : null;

    c.innerHTML = "";
    var head = el("div", "inv-head");
    head.innerHTML =
      '<div><div class="kv">INVOICE</div><div class="big">' + iv.invoiceId + '</div></div>' +
      kv("Customer", iv.customer + ' <span class="mono" style="color:var(--muted)">' + iv.kunnr + '</span>') +
      kv("Amount", money(iv.amount)) + kv("Terms", iv.terms) +
      kv("Days Past Due", iv.dpd + 'd') + kv("Vertical", iv.vertical);
    c.appendChild(head);

    var loop = el("div", "loop");
    loop.innerHTML =
      stage("sense", "S", "SENSE", d.fired ? '<b>' + d.top.result.features.length + ' signals</b> detected in the transaction record' : 'Scanning event series — <b>no anomaly</b>') +
      stage("diag", "D", "DIAGNOSE", pat ? 'Pattern <b>#' + pat.id + ' — ' + pat.name + '</b> (' + (d.confidence * 100 | 0) + '%)' : 'No behavioural pattern matches') +
      stage("decide", "R", "DECIDE", dec ? 'Counter-strategy: <b>' + tierLabel(dec.branch.tier) + '</b>' + (dec.requiresHITL ? ' · HITL gate' : '') : 'Standard dunning — no intervention') +
      stage("act", "A", "ACT", dec ? '<b>' + countActions(res.actionDAG) + ' actions</b> assembled as a rollback-ready DAG' : 'Monitor only', true);
    c.appendChild(loop);

    if (!d.fired) { c.appendChild(cleanCard(iv)); c.appendChild(note()); animateStages(); return; }

    var grid = el("div", "grid");
    grid.appendChild(brainCard(iv, pat, d));
    var right = el("div"); right.style.display = "flex"; right.style.flexDirection = "column"; right.style.gap = "18px";
    right.appendChild(diagnosisCard(pat, d));
    right.appendChild(decisionCard(pat, dec));
    grid.appendChild(right);
    c.appendChild(grid);

    var actionWrap = el("div"); actionWrap.style.marginTop = "18px";
    actionWrap.appendChild(actionCard(pat, dec, res));
    c.appendChild(actionWrap);
    c.appendChild(note());
    animateStages();
  }

  function kv(k, v) { return '<div><div class="kv">' + k + '</div><b>' + v + '</b></div>'; }
  function stage(s, ic, tag, body, last) {
    return '<div class="stage s-' + s + '"><div class="tag"><span class="ic">' + ic + '</span>' + tag + '</div>' +
      '<div class="body">' + body + '</div>' + (last ? '' : '<span class="arrow">→</span>') + '</div>';
  }
  function tierLabel(t) { return { primary: "Assisted nudge", escalation: "Escalate & enforce", immediate: "Immediate block", default: "Standard action" }[t] || t; }
  function countActions(dag) { var n = 0; dag.forEach(function (s) { n += s.actions.length; }); return n; }
  function animateStages() {
    var st = document.querySelectorAll(".stage");
    st.forEach(function (s, i) { setTimeout(function () { s.classList.add("on"); }, 120 + i * 260); });
  }

  function brainCard(iv, pat, d) {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">B</span>The Three-Layer Semantic Brain</h4>';
    var tables = (erp() === "sap" ? pat.sources.sap : pat.sources.oracle);
    var tchips = tables.map(function (t) { return '<span class="tbl">' + escapeHtml(t) + '</span>'; }).join("");
    var l1 = el("div", "layer");
    l1.innerHTML = '<div class="lh"><span class="ln">1</span>Logical Mapping</div>' +
      '<div class="ld">' + escapeHtml(pat.layer1_logicalMapping) + '</div>' +
      '<div class="tables">' + tchips + '</div>';
    card.appendChild(l1);
    var l2 = el("div", "layer");
    var tl = iv.eventSeries.map(function (e, i) {
      var flag = i === iv.eventSeries.length - 1 ? " flag" : "";
      return '<div class="tl' + flag + '"><div class="d">Day ' + e.day + '</div><div class="l">' + escapeHtml(e.label) + '</div></div>';
    }).join("");
    l2.innerHTML = '<div class="lh"><span class="ln">2</span>Event Series</div>' +
      '<div class="ld">' + escapeHtml(pat.layer2_eventSeries) + '</div>' +
      '<div class="timeline">' + tl + '</div>';
    card.appendChild(l2);
    var l3 = el("div", "layer");
    var rows = d.top.result.features.map(function (ft) {
      return '<div class="fv">' + ft.value + '</div><div><div class="fn">' + ft.name + '</div><div class="fh">' + escapeHtml(ft.hint || "") + '</div></div>';
    }).join("");
    l3.innerHTML = '<div class="lh"><span class="ln">3</span>AI Features — Expert Triggers</div>' +
      '<div class="ld">Pre-calculated triggers that drive cognitive reasoning.</div>' +
      '<div class="feat">' + rows + '</div>';
    card.appendChild(l3);
    return card;
  }

  function diagnosisCard(pat, d) {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">D</span>Diagnosis</h4>';
    var pad = el("div", "pad");
    pad.innerHTML = '<div class="diag-top">' + gauge(d.confidence) +
      '<div class="diag-meta"><div class="pat">#' + pat.id + ' · ' + pat.name + '</div>' +
      '<div class="cat">' + pat.category + '</div>' +
      '<span class="badge" style="background:' + PRIO_COLOR[pat.priority] + '">' + pat.priority + ' priority</span></div></div>' +
      '<div class="mental">“' + escapeHtml(pat.mentalModel) + '”<span class="who">— the 25-year expert\'s reasoning, codified</span></div>';
    card.appendChild(pad);
    return card;
  }

  function decisionCard(pat, dec) {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">R</span>Decision & Governance</h4>';
    var pad = el("div", "pad");
    var tiers = ["primary", "escalation", "immediate"];
    var present = {}; (pat.branchingDAG || []).forEach(function (b) { present[b.tier] = true; });
    var tbar = tiers.filter(function (t) { return present[t]; }).map(function (t) {
      var on = dec.branch.tier === t;
      return '<div class="t' + (on ? " on" + (t === "immediate" ? " immediate" : "") : "") + '">' + tierLabel(t) + '</div>';
    }).join("");
    var html = '<div class="branchsel"><div class="cond">' + escapeHtml(dec.branch.condition) + '</div></div>' +
      '<div class="tierbar">' + tbar + '</div>' +
      '<div style="font-size:12px;color:var(--muted)">Severity score <b style="color:var(--decide)">' + dec.severity.toFixed(2) + '</b> selects the response tier. The system acts proportionally to value at risk.</div>';
    if (dec.requiresHITL) {
      html += '<div class="hitl"><span class="lock">🔒</span><div class="txt"><b>Human-in-the-Loop gate</b>' + escapeHtml(dec.hitl) + '</div></div>';
    }
    pad.innerHTML = html;
    card.appendChild(pad);
    return card;
  }

  function actionCard(pat, dec, res) {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">A</span>Action DAG — Deterministic, Rollback-Ready Execution</h4>';
    var pad = el("div", "pad");
    var dag = el("div", "dag");
    res.actionDAG.forEach(function (s) {
      var node = el("div", "dnode");
      var verbs = s.actions.map(function (a) {
        var cls = "verb" + (a.mutating ? " write" : "");
        var sg = a.compensable ? '<span class="sg">↺ SAGA</span>' : '';
        return '<span class="' + cls + '">' + escapeHtml(a.verb) + sg + '</span>';
      }).join("");
      node.innerHTML = '<span class="sn">' + s.step + '</span><div class="dverbs">' + verbs + '</div>';
      dag.appendChild(node);
    });
    pad.appendChild(dag);
    var saga = el("div", "saga-row");
    saga.innerHTML = chip("↺", "Saga: write-steps auto-rollback") + chip("⟳", "Idempotent retry on locked records") +
      chip("⊕", "SAP remains system of record") + chip("⊘", "Deterministic API blocks — no hallucination");
    pad.appendChild(saga);
    var exec = el("div", "exec");
    if (dec.requiresHITL) {
      exec.innerHTML = '<button class="btn approve" id="approveBtn">🔒 Approve &amp; Execute DAG</button><button class="btn ghost">Edit payload</button>';
    } else {
      exec.innerHTML = '<button class="btn go" id="approveBtn">Execute DAG</button><button class="btn ghost">Queue for review</button>';
    }
    pad.appendChild(exec);
    var gov = el("div", "gov-note");
    gov.innerHTML = '<span>Mode: <b>' + (dec.requiresHITL ? "Assisted (HITL)" : "Policy-approved") + '</b></span>' +
      '<span>Outcome attribution: <b>ON</b></span><span>Audit log: <b>cryptographic</b></span>';
    pad.appendChild(gov);
    card.appendChild(pad);
    setTimeout(function () {
      var b = document.getElementById("approveBtn");
      if (b) b.onclick = function () {
        b.textContent = "✓ Executed — " + countActions(res.actionDAG) + " steps committed, attribution tracking";
        b.className = "btn ghost"; b.disabled = true;
      };
    }, 10);
    return card;
  }

  function chip(ic, txt) { return '<span class="chip">' + ic + ' ' + txt + '</span>'; }
  function cleanCard(iv) {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">✓</span>No Behavioural Pattern Detected</h4>' +
      '<div class="pad"><p style="margin:0 0 8px">This invoice is paying within normal parameters — the cognitive loop found no float-extension, dispute-manipulation, or credit-risk tactic. Standard dunning applies; the analyst\'s attention is freed for the items that matter.</p>' +
      '<div class="saga-row">' + chip("", "Payment ratio nominal") + chip("", "No dispute proximity") + chip("", "DPD within terms") + '</div></div>';
    return card;
  }
  function note() {
    return el("div", "note", "Cognitive Cockpit — Module 3. Engine runs on-device from the AR Pattern Library v2 (" + meta.patternCount + " patterns). Live-Claude diagnosis narrative is a pluggable layer.");
  }
  function escapeHtml(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  var EMPTY =
    '<div class="empty"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">' +
    '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>' +
    '<div><b>Select an invoice</b> to watch the cognitive loop diagnose it.</div>' +
    '<div style="font-size:12px;max-width:340px">Each open item carries an event timeline. ProcessIQ senses the signals, names the behavioural pattern, and assembles a governance-approved action.</div></div>';

  /* ---------- module registration ---------- */
  window.PIQ.modules.cockpit = {
    render: function (view) {
      // honor a deep-link from the Pattern Library ("see it live")
      if (window.PIQ._jumpInvoice) {
        selected = book.invoices.filter(function (iv) { return iv.belnr === window.PIQ._jumpInvoice; })[0] || selected;
        window.PIQ._jumpInvoice = null;
      }
      view.innerHTML =
        '<div class="wrap"><aside class="worklist"><h3>Collections Worklist</h3><div id="invList"></div></aside>' +
        '<main class="cockpit" id="cockpit"></main></div>';
      renderList();
      renderCockpit();
    },
  };
  window.PIQ.onErp(function () { if (window.PIQ.active === "cockpit") { renderList(); renderCockpit(); } });
})();

/* ProcessIQ — Pattern Library (Module 2)
 * The expert's playbook, codified: browse all 31 behavioural patterns, filter by
 * category / priority / search, and drill into the full three-layer mapping +
 * conditional Branching DAG with HITL gates. (Deck slides 6 & 11.) */
(function () {
  "use strict";
  var E = window.ProcessIQEngine;
  var patterns = window.PIQ.patterns;
  var meta = window.PIQ.meta;
  var book = window.PIQ.book;
  var PRIO = meta.priorityLegend;

  var state = { q: "", cat: "All", prio: "All", selId: patterns[0].id };

  function erp() { return window.PIQ.erp; }
  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function filtered() {
    var q = state.q.toLowerCase();
    return patterns.filter(function (p) {
      if (state.cat !== "All" && p.category !== state.cat) return false;
      if (state.prio !== "All" && p.priority !== state.prio) return false;
      if (q && (p.name + " " + p.category + " " + p.layer3_feature + " " + p.mentalModel).toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
  }

  function triggerInvoice(p) {
    return book.invoices.filter(function (iv) { return iv.groundTruthFeature === p.featureSlug; })[0] || null;
  }

  /* ---------- render ---------- */
  function render(view) {
    if (window.PIQ._jumpPattern) { state.selId = window.PIQ._jumpPattern; window.PIQ._jumpPattern = null; }
    view.innerHTML = '<div class="lib"></div>';
    var root = view.querySelector(".lib");

    // header + matrix
    var header = el("div", "lib-head");
    var matrix = meta.categories.map(function (c) {
      return '<div class="mx" data-cat="' + esc(c.category) + '">' +
        '<b>' + c.count + '</b><span>' + esc(shortCat(c.category)) + '</span>' +
        '<div class="mxbar">' + bar(c) + '</div></div>';
    }).join("");
    header.innerHTML =
      '<div><div class="kv">The Expert\'s Playbook, Codified</div>' +
      '<h2 style="font-size:22px;margin:2px 0 0">' + meta.patternCount + ' Behavioural Patterns</h2></div>' +
      '<div class="matrix">' + matrix + '</div>';
    root.appendChild(header);

    // filter bar
    var fbar = el("div", "fbar");
    var cats = ["All"].concat(meta.categories.map(function (c) { return c.category; }));
    var prios = ["All", "Critical", "High", "Medium", "Low"];
    fbar.innerHTML =
      '<input id="libSearch" class="search" placeholder="Search patterns, features, tactics…" value="' + esc(state.q) + '"/>' +
      '<div class="chips" id="catChips">' + cats.map(function (c) {
        return '<button class="chip-f' + (state.cat === c ? " on" : "") + '" data-cat="' + esc(c) + '">' + esc(shortCat(c)) + '</button>';
      }).join("") + '</div>' +
      '<div class="chips" id="prioChips">' + prios.map(function (p) {
        var col = p === "All" ? "" : 'style="--pc:' + PRIO[p] + '"';
        return '<button class="chip-p' + (state.prio === p ? " on" : "") + '" ' + col + ' data-prio="' + p + '">' + p + '</button>';
      }).join("") + '</div>';
    root.appendChild(fbar);

    // master-detail
    var md = el("div", "lib-md");
    md.innerHTML = '<div class="lib-list" id="libList"></div><div class="lib-detail" id="libDetail"></div>';
    root.appendChild(md);

    wire(root);
    renderList();
    renderDetail();
  }

  function shortCat(c) {
    return c.replace(" & Deduction Manipulation", " & Deduction")
      .replace("Intentional Stalling & Delay Tactics", "Stalling & Delay")
      .replace("Credit Risk & Insolvency Indicators", "Credit Risk")
      .replace("Cash Application & Remittance Friction", "Cash App & Remittance")
      .replace("Relationship & Contractual Abuse", "Relationship Abuse");
  }
  function bar(c) {
    var seg = [["Critical", c.Critical], ["High", c.High], ["Medium", c.Medium], ["Low", c.Low]];
    return seg.filter(function (s) { return s[1]; }).map(function (s) {
      return '<i style="flex:' + s[1] + ';background:' + PRIO[s[0]] + '"></i>';
    }).join("");
  }

  function renderList() {
    var list = document.getElementById("libList"); if (!list) return;
    var items = filtered();
    if (!items.length) { list.innerHTML = '<div class="lib-none">No patterns match these filters.</div>'; return; }
    list.innerHTML = items.map(function (p) {
      return '<div class="prow' + (state.selId === p.id ? " sel" : "") + '" data-id="' + p.id + '">' +
        '<div class="pnum" style="background:' + PRIO[p.priority] + '">' + p.id + '</div>' +
        '<div class="pmain"><div class="pn">' + esc(p.name) + '</div>' +
        '<div class="pc">' + esc(shortCat(p.category)) + '</div></div>' +
        '<div class="pf mono">' + esc(p.layer3_feature) + '</div></div>';
    }).join("");
    list.querySelectorAll(".prow").forEach(function (r) {
      r.onclick = function () { state.selId = +r.dataset.id; renderList(); renderDetail(); };
    });
  }

  function renderDetail() {
    var d = document.getElementById("libDetail"); if (!d) return;
    var p = patterns.filter(function (x) { return x.id === state.selId; })[0];
    if (!p) { d.innerHTML = ""; return; }
    var tables = (erp() === "sap" ? p.sources.sap : p.sources.oracle);
    var tchips = tables.map(function (t) { return '<span class="tbl">' + esc(t) + '</span>'; }).join("");

    // branching DAG tree
    var branches = (p.branchingDAG || []).map(function (b) {
      var verbs = b.actions.map(function (a) { return '<span class="verb' + (E.detectors ? "" : "") + '">' + esc(a) + '</span>'; }).join("");
      var hitl = b.hitl ? '<div class="b-hitl">🔒 HITL: ' + esc(b.hitl) + '</div>' : "";
      return '<div class="branch t-' + b.tier + '"><div class="b-cond mono">' + esc(b.condition) + '</div>' +
        '<div class="b-acts">' + verbs + '</div>' + hitl + '</div>';
    }).join("");

    var flat = p.originalDAG.map(function (s) { return '<span class="verb flat">' + esc(s) + '</span>'; }).join('<span class="arr">→</span>');
    var tiv = triggerInvoice(p);
    var liveLink = tiv ? '<button class="btn go sm" id="toCockpit">See it live in the Cognitive Cockpit →</button>' : '';

    d.innerHTML =
      '<div class="d-head"><div class="pnum lg" style="background:' + PRIO[p.priority] + '">' + p.id + '</div>' +
      '<div><h2 style="font-size:21px;margin:0">' + esc(p.name) + '</h2>' +
      '<div class="cat">' + esc(p.category) + '</div>' +
      '<span class="badge" style="background:' + PRIO[p.priority] + '">' + p.priority + ' priority</span>' +
      '<span class="badge ghost mono">' + esc(p.layer3_feature) + '</span></div></div>' +

      '<div class="mental">“' + esc(p.mentalModel) + '”<span class="who">— the analyst\'s mental model</span></div>' +

      '<div class="d-grid">' +
        layer("1", "Logical Mapping", esc(p.layer1_logicalMapping), '<div class="tables">' + tchips + '</div>') +
        layer("2", "Event Series", esc(p.layer2_eventSeries), "") +
        layer("3", "AI Feature", '<b>' + esc(p.layer3_feature) + '</b> — pre-calculated expert trigger', '<pre class="sql">' + esc(p.conceptualSQL) + '</pre>') +
      '</div>' +

      '<div class="d-sec"><h4>Original Action DAG <span class="muted">flat sequence</span></h4><div class="flatdag">' + flat + '</div></div>' +

      '<div class="d-sec"><h4>Branching DAG <span class="muted">conditional decision tree for agentic orchestration</span></h4>' +
      '<div class="branches">' + branches + '</div></div>' +
      (p.hitlGates.length ? '<div class="gatebar">🔒 HITL gates: ' + p.hitlGates.map(esc).join(" · ") + '</div>' : '') +
      liveLink;

    var btn = document.getElementById("toCockpit");
    if (btn) btn.onclick = function () {
      window.PIQ._jumpInvoice = tiv.belnr;
      window.PIQ.go("cockpit");
    };
  }

  function layer(n, title, desc, extra) {
    return '<div class="dlayer"><div class="lh"><span class="ln">' + n + '</span>' + title + '</div>' +
      '<div class="ld">' + desc + '</div>' + (extra || "") + '</div>';
  }

  function wire(root) {
    var s = root.querySelector("#libSearch");
    s.oninput = function () { state.q = s.value; renderList(); };
    root.querySelector("#catChips").onclick = function (e) {
      var b = e.target.closest("[data-cat]"); if (!b) return;
      state.cat = b.dataset.cat;
      this.querySelectorAll(".chip-f").forEach(function (x) { x.classList.toggle("on", x === b); });
      renderList();
    };
    root.querySelector("#prioChips").onclick = function (e) {
      var b = e.target.closest("[data-prio]"); if (!b) return;
      state.prio = b.dataset.prio;
      this.querySelectorAll(".chip-p").forEach(function (x) { x.classList.toggle("on", x === b); });
      renderList();
    };
    // matrix tiles act as category filters
    root.querySelectorAll(".mx").forEach(function (m) {
      m.onclick = function () {
        state.cat = state.cat === m.dataset.cat ? "All" : m.dataset.cat;
        render(document.getElementById("view"));
      };
    });
  }

  window.PIQ.modules.library = { render: render };
  window.PIQ.onErp(function () { if (window.PIQ.active === "library") renderDetail(); });
})();

/* ProcessIQ — Action & Governance (Module 4)
 * Deck slides 13-14: the brain decides, pre-built deterministic blocks execute.
 *  - Interactive Action-DAG execution simulator with live Saga rollback
 *  - The three trust modes (Assisted -> Policy-Approved -> Autonomous)
 *  - The four enterprise governance guarantees */
(function () {
  "use strict";
  var E = window.ProcessIQEngine;
  var patterns = window.PIQ.patterns;

  // patterns whose flat DAG has >=2 mutating steps make the best Saga demos
  function dagSteps(p) {
    return (p.originalDAG || []).map(function (v) { return E.classifyAction(v); });
  }
  function writeCount(p) { return dagSteps(p).filter(function (s) { return s.mutating; }).length; }

  var state = {
    mode: "assisted",        // assisted | policy | autonomous
    patId: pickDefault(),
    injectFail: false,
    failStep: 2,             // 1-indexed
    run: null,               // execution state per step
  };
  function pickDefault() {
    var best = patterns.slice().sort(function (a, b) { return writeCount(b) - writeCount(a); });
    return best[0].id;
  }
  function pat() { return patterns.filter(function (p) { return p.id === state.patId; })[0]; }
  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  var MODES = {
    assisted: {
      label: "Assisted", tag: "DEFAULT", color: "var(--sense)",
      blurb: "AI detects the pattern, assembles evidence, and drafts the action payload — then queues it. A human clicks APPROVE before any execution.",
      bullets: ["AI detects the pattern", "AI assembles evidence", "AI drafts action payload", "AI queues for approval", "Human clicks APPROVE", "System executes DAG"],
      gate: function () { return true; },  // everything gated
    },
    policy: {
      label: "Policy-Approved", tag: "EARNED", color: "var(--decide)",
      blurb: "Standing authorization for low-risk, reversible actions. CFO + Controller approve the POLICY (versioned, effective-dated); the system applies within bounds and gates only the rest.",
      bullets: ["Standing authorization for low-risk, reversible actions", "Policy versioned & effective-dated", "CFO + Controller approve the POLICY", "System applies automatically within bounds", "Audit trail for every execution"],
      gate: function (step) { return step.mutating && step.highRisk; },  // gate only high-risk writes
    },
    autonomous: {
      label: "Autonomous", tag: "MATURE", color: "var(--act)",
      blurb: "Full closed-loop execution — only after calibration proves accuracy. Outcome attribution validates every action; underperforming patterns are flagged; rollback is always available.",
      bullets: ["Full closed-loop execution", "Only after calibration proves accuracy", "Outcome attribution validates every action", "Underperforming patterns flagged", "Rollback always available", "Cryptographic audit log"],
      gate: function () { return false; },  // nothing gated
    },
  };

  // a write step is "high-risk" if it touches credit/delivery/legal/portal
  var HIGH_RISK = /Delivery_Block|Legal|Credit_Review|Reduce_Credit|Disable|Mandate_Prepayment|CFO/i;

  function buildRun() {
    var steps = dagSteps(pat()).map(function (s, i) {
      return {
        i: i, verb: s.verb, mutating: s.mutating, compensable: s.compensable,
        highRisk: s.mutating && HIGH_RISK.test(s.verb),
        status: "idle",  // idle | gated | running | committed | failed | rolledback
      };
    });
    steps.forEach(function (s) { if (MODES[state.mode].gate(s)) s.status = "gated"; });
    return steps;
  }

  /* ---------------- render ---------------- */
  function render(view) {
    state.run = buildRun();
    view.innerHTML = '<div class="gov"></div>';
    var root = view.querySelector(".gov");

    root.appendChild(headerEl());
    root.appendChild(modeStrip());

    var grid = el("div", "gov-grid");
    grid.appendChild(simulatorCard());
    grid.appendChild(guaranteesCard());
    root.appendChild(grid);

  }

  function headerEl() {

  }

  /* ---- DAG execution simulator ---- */
  function simulatorCard() {
    var card = el("div", "card");

    var pad = el("div", "pad");
    var opts = patterns.slice().sort(function (a, b) { return writeCount(b) - writeCount(a); })
      .map(function (p) { return '<option value="' + p.id + '"' + (p.id === state.patId ? " selected" : "") + '>#' + p.id + ' · ' + esc(p.name) + '</option>'; }).join("");

  function paintSteps() {
    var host = document.getElementById("execDag"); if (!host) return;
    host.innerHTML = state.run.map(function (s) {
      var cls = "estep st-" + s.status;
      var badge = s.mutating ? '<span class="sg' + (s.highRisk ? " hr" : "") + '">' + (s.highRisk ? "HIGH-RISK WRITE" : "WRITE · ↺ SAGA") + '</span>'
        : '<span class="sg read">READ / NOTIFY</span>';
      var icon = { idle: "○", gated: "🔒", running: "◐", committed: "✓", failed: "✕", rolledback: "↺" }[s.status];
      return '<div class="' + cls + '"><span class="ei">' + icon + '</span>' +
        '<div class="ev"><span class="evn mono">' + esc(s.verb) + '</span>' + badge + '</div></div>';
    }).join("");
    // failstep options
    var sel = document.getElementById("simFailStep");
    if (sel && sel.options.length !== state.run.length) {
      sel.innerHTML = state.run.map(function (s, i) { return '<option value="' + (i + 1) + '"' + ((i + 1) === state.failStep ? " selected" : "") + '>' + (i + 1) + '</option>'; }).join("");
    }
  }

  function log(msg, kind) {
    var l = document.getElementById("simLog"); if (!l) return;
    var row = el("div", "logrow" + (kind ? " " + kind : ""), msg);
    l.appendChild(row); l.scrollTop = l.scrollHeight;
  }

  function execute() {
    state.run = buildRun();
    paintSteps();
    document.getElementById("simLog").innerHTML = "";
    var mode = MODES[state.mode];
    log("Mode: <b>" + mode.label + "</b> — " + (state.mode === "assisted" ? "all steps queued for human approval" : state.mode === "policy" ? "low-risk steps auto-apply; high-risk gated" : "full closed-loop, attribution on"), "muted");

    var i = 0, committed = [];
    function next() {
      if (i >= state.run.length) { log("✓ DAG complete — outcome attribution recording.", "ok"); return; }
      var s = state.run[i];
      if (s.status === "gated") {
        log("🔒 Step " + (i + 1) + " <b>" + s.verb + "</b> — awaiting human approval (" + mode.label + ")", "gate");
        i++; return setTimeout(next, 420);
      }
      s.status = "running"; paintSteps();
      setTimeout(function () {
        var willFail = state.injectFail && (i + 1) === state.failStep;
        if (willFail) {
          s.status = "failed"; paintSteps();
          log("✕ Step " + (i + 1) + " <b>" + s.verb + "</b> FAILED (ERP record locked / API error)", "err");
          return rollback(committed);
        }
        s.status = "committed"; paintSteps();
        if (s.compensable) committed.push(s);
        log((s.mutating ? "✓ Committed: " : "✓ Done: ") + "<b>" + s.verb + "</b>" + (s.mutating ? " (compensating step registered)" : ""), "ok");
        i++; setTimeout(next, 520);
      }, 560);
    }
    next();
  }

  // Saga: on failure, compensate previously-committed writes in reverse order.
  function rollback(committed) {
    if (!committed.length) { log("No prior writes to compensate. System consistent. SAP untouched beyond the failed call.", "muted"); return; }
    log("↺ Saga triggered — rolling back " + committed.length + " committed write(s) in reverse:", "warn");
    var k = committed.length - 1;
    (function undo() {
      if (k < 0) { log("↺ Rollback complete — ledger restored to pre-DAG state. No partial execution, no corruption.", "warn"); return; }
      var s = committed[k];
      s.status = "rolledback"; paintSteps();
      log("   ↺ Compensated: <b>" + s.verb + "</b>", "warn");
      k--; setTimeout(undo, 480);
    })();
  }

  /* ---- governance guarantees ---- */
  function guaranteesCard() {
    var wrap = el("div");
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">⊕</span>Enterprise-Grade Governance</h4>';

      ["⟳", "Idempotent Retry", "Locked ERP records trigger wait-and-retry, not failure. Re-running a step never double-posts."],
      ["⊕", "System of Record", "SAP / Oracle remains the system of record — always. The AI operates strictly within ERP boundaries."],
      ["⊘", "No Hallucination", "Deterministic, versioned API blocks — not generated code. The AI never touches the ERP without governance."],
    ];
    pad.innerHTML = '<div class="guars">' + G.map(function (g) {
      return '<div class="guar"><div class="gi">' + g[0] + '</div><div><div class="gn">' + g[1] + '</div><div class="gd">' + esc(g[2]) + '</div></div></div>';
    }).join("") + '</div>';
    card.appendChild(pad);
    wrap.appendChild(card);

    // current-mode characteristics
    var m = MODES[state.mode];
    var mc = el("div", "card"); mc.style.marginTop = "18px";
    mc.innerHTML = '<h4><span class="num" style="background:' + m.color + '">' + m.tag.charAt(0) + '</span>' + m.label + ' Mode</h4>' +
      '<div class="pad"><ul class="modelist">' + m.bullets.map(function (b) { return '<li>' + esc(b) + '</li>'; }).join("") + '</ul></div>';
    wrap.appendChild(mc);
    return wrap;
  }

  /* ---- controls ---- */
  function wireControls(root) {
    root.querySelector(".modetabs").onclick = function (e) {
      var b = e.target.closest("[data-mode]"); if (!b) return;
      state.mode = b.dataset.mode;
      render(document.getElementById("view"));
    };
    document.getElementById("simPat").onchange = function () { state.patId = +this.value; state.run = buildRun(); paintSteps(); document.getElementById("simLog").innerHTML = ""; };
    document.getElementById("simRun").onclick = execute;
    document.getElementById("simReset").onclick = function () { state.run = buildRun(); paintSteps(); document.getElementById("simLog").innerHTML = ""; };
    document.getElementById("simFail").onchange = function () { state.injectFail = this.checked; };
    var fs = document.getElementById("simFailStep");
    if (fs) fs.onchange = function () { state.failStep = +this.value; };
  }

  window.PIQ.modules.governance = { render: render };
})();

  /* cumulative value trajectory — SVG area chart */
  function trajectoryCard() {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">$</span>Cumulative Value Trajectory — Year 1</h4>';
    var pad = el("div", "pad");
    var W = 640, H = 280, padL = 54, padR = 24, padT = 22, padB = 44;
    var pts = roi.trajectory;
    var maxV = pts[pts.length - 1].cumulative * 1.08;
    var iw = W - padL - padR, ih = H - padT - padB;
    function X(i) { return padL + iw * i / (pts.length - 1); }
    function Y(v) { return padT + ih * (1 - v / maxV); }

    var line = pts.map(function (p, i) { return (i ? "L" : "M") + X(i) + " " + Y(p.cumulative); }).join(" ");

    var grid = "";
    for (var g = 0; g <= 4; g++) {
      var v = maxV * g / 4, y = Y(v);

      '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="display:block">' +
      '<defs><linearGradient id="roiArea" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="#16a085" stop-opacity="0.28"/><stop offset="1" stop-color="#16a085" stop-opacity="0.02"/></linearGradient></defs>' +

    pad.innerHTML = '<div class="attr">' + rows + '</div>' +

})();
