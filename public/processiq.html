/* Stage 4 · Run & Govern — Live Operations
 * The composed process, in production. A deterministic transaction stream flows in:
 *   • clean transactions match the happy path → straight-through, touchless (auto)
 *   • transactions with variation are matched to a pattern's branching DAG → the branch
 *     fires; if the branch carries a HITL gate, DAG approval is sought before execution
 * Live KPIs (STP rate, auto-resolved, pending approvals, value released) update as it runs.
 */
(function () {
  "use strict";
  var PRIO = window.PIQ.meta.priorityLegend;

  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function money(n) { return window.PIQ.E._money(n); }
  function C() { return window.PIQ.composition; }

  var NAMES = ["Halberd Industrial", "Meridian Foods", "Cobalt Retail", "Northwind Mfg",
    "Arcadia Health", "Veritas Logistics", "Sundial CPG", "Orion Components",
    "Lumen Energy", "Pioneer Textiles", "Atlas Freight", "Crest Pharma"];

  var sim = null;     // simulator state (rebuilt when the composition changes)
  var timer = null;

  function pickBranch(p, i) {
    var bs = p.branchingDAG || [];
    if (!bs.length) return -1;
    return i % bs.length;
  }

  function buildSim() {
    var c = C();
    var pats = window.PIQ.selectedPatterns();
    // Deterministic SYNTHETIC demo stream — 18 fabricated transactions with a fixed
    // spread of clean (happy-path) and variation (pattern-matched) items. This is
    // illustrative demo data, not a live ERP feed; nothing here is a real invoice.
    var q = [];
    for (var i = 0; i < 18; i++) {
      var entity = NAMES[i % NAMES.length];
      var amt = 12000 + ((i * 53) % 40) * 2200;   // deterministic spread
      if (i % 3 === 2 && pats.length) {
        var p = pats[i % pats.length];
        var bidx = pickBranch(p, i);
        var br = p.branchingDAG[bidx] || {};
        q.push({ n: i + 1, id: "TXN-" + (10480 + i * 7), entity: entity, amt: amt,
          kind: "variation", patternId: p.id, branchIdx: bidx, needsApproval: !!br.hitl, status: "queued" });
      } else {
        q.push({ n: i + 1, id: "TXN-" + (10480 + i * 7), entity: entity, amt: amt, kind: "clean", status: "queued" });
      }
    }
    applyCompoundSeed(q, pats);
    return { q: q, cursor: 0, log: [], counts: { stp: 0, auto: 0, pending: 0, approved: 0, rejected: 0, value: 0 } };
  }

  /* Compound-signal seed — force two variation transactions to share one entity and
     fire two constituents of an applicable cross-process pattern, so the second-pass
     compound scan reliably surfaces an emergent signal in the demo. */
  function applyCompoundSeed(q, pats) {
    var selIds = {}; pats.forEach(function (p) { selIds[p.id] = 1; });
    var applicable = window.PIQ.compoundPatterns();
    var pick = null;
    for (var a = 0; a < applicable.length; a++) {
      var cons = applicable[a].constituents.filter(function (id) { return selIds[id]; });
      if (cons.length >= 2) { pick = cons; break; }
    }
    if (!pick) return;
    var slots = [];
    for (var j = 0; j < q.length; j++) if (q[j].kind === "variation") slots.push(j);
    if (slots.length < 2) return;
    var entity = q[slots[0]].entity;
    [0, 1].forEach(function (k) {
      var t = q[slots[k]], p = window.PIQ.pattern(pick[k]);
      if (!p) return;
      var br = (p.branchingDAG || [])[0] || {};
      t.entity = entity; t.patternId = pick[k]; t.branchIdx = 0; t.needsApproval = !!br.hitl;
    });
  }

  /* Second pass — after individual transactions are matched, correlate the fired
     patterns per entity against the theme's cross-process compound patterns. A
     combination that no single process would flag surfaces as a Compound Signal. */
  function compoundSignals() {
    var applicable = window.PIQ.compoundPatterns();
    if (!applicable.length || !sim) return [];
    var byEntity = {}, globalFired = {};
    sim.q.forEach(function (t) {
      if (t.kind === "variation" && t.patternId &&
          (t.status === "auto" || t.status === "approved" || t.status === "pending")) {
        (byEntity[t.entity] = byEntity[t.entity] || {})[t.patternId] = 1;
        globalFired[t.patternId] = 1;
      }
    });
    var out = [];
    applicable.forEach(function (a) {
      if (a.constituents.length < 2) return;
      var fired = a.constituents.filter(function (id) { return globalFired[id]; });
      if (fired.length < 2) return;
      var bestE = null, bestN = 0;
      Object.keys(byEntity).forEach(function (e) {
        var n = a.constituents.filter(function (id) { return byEntity[e][id]; }).length;
        if (n > bestN) { bestN = n; bestE = e; }
      });
      out.push({ cp: a.cp, theme: a.theme, fired: fired, entity: bestE, concentrated: bestN >= 2 });
    });
    return out;
  }

  function ensureSim(force) {
    var sig = C().patternIds.join(",") + "|" + Object.keys(C().blocks).length;
    if (force || !sim || sim.sig !== sig) { sim = buildSim(); sim.sig = sig; }
  }

  /* ---------------- render ---------------- */
  function render(view) {
    stopAuto();
    if (!C().patternIds.length) { view.appendChild(empty()); return; }
    ensureSim(false);
    var root = el("div", "rt");
    root.appendChild(head());
    root.appendChild(kpis());
    var comp = el("div", "rt-compound"); comp.id = "rtCompound";
    root.appendChild(comp);   // filled by drawCompound as compound signals emerge
    var grid = el("div", "rt-grid");
    grid.innerHTML = '<div class="rt-stream" id="rtStream"></div>' +
      '<div class="rt-side"><div class="rt-approvals" id="rtApprovals"></div>' +
      '<div class="rt-feed" id="rtFeed"></div></div>';
    root.appendChild(grid);
    view.appendChild(root);
    drawStream(); drawApprovals(); drawFeed(); drawKpis(); drawCompound();
    wireControls(root);
  }

  function empty() {
    var d = el("div", "fit-empty",
      '<div class="kv">Stage 4 · Run & Govern</div><h2>No live process</h2>' +
      '<p>Compose a process in the <b>Studio</b> and promote it through <b>Discover & Fit</b> to operate it here.</p>' +
      '<button class="btn go" id="toStudio">← Go to Studio</button>');
    d.querySelector("#toStudio").onclick = function () { window.PIQ.go("studio"); };
    return d;
  }

  function head() {
    var f = window.PIQ.fn(), p = window.PIQ.proc();
    return el("div", "rt-head",
      '<div><div class="kv">Stage 4 · Run & Govern — Agentic workflow in production</div>' +
      '<h2>' + esc(f.name) + ' › ' + esc((p || {}).name || "") + ' <span class="livedot">● LIVE</span></h2></div>' +
      '<div class="rt-ctrl">' +
        '<button class="btn go sm" id="rtStep">Process next ▸</button>' +
        '<button class="btn sm" id="rtAuto">Auto-run ⏵</button>' +
        '<button class="btn ghost sm" id="rtReset">Reset</button></div>');
  }

  function kpis() {
    return el("div", "rt-kpis", '' +
      kpi("kStp", "0%", "Straight-through") + kpi("kAuto", "0", "Auto-resolved") +
      kpi("kPend", "0", "Pending approval") + kpi("kAppr", "0", "DAG-approved") +
      kpi("kVal", "$0", "Value released"));
  }
  function kpi(id, v, l) { return '<div class="rkpi"><b id="' + id + '">' + v + '</b><span>' + l + '</span></div>'; }

  function drawKpis() {
    var c = sim.counts, done = sim.cursor;
    var stp = done ? Math.round(100 * c.stp / done) : 0;
    set("kStp", stp + "%"); set("kAuto", c.auto); set("kPend", c.pending);
    set("kAppr", c.approved); set("kVal", money(c.value));
  }
  function set(id, v) { var n = document.getElementById(id); if (n) n.textContent = v; }

  function drawStream() {
    var s = document.getElementById("rtStream"); if (!s) return;
    var rows = sim.q.map(function (t) {
      var cls = "rtx s-" + t.status;
      var badge, sub;
      if (t.status === "queued") { badge = '<span class="rtx-b q">queued</span>'; sub = ""; }
      else if (t.kind === "clean") { badge = '<span class="rtx-b stp">STRAIGHT-THROUGH</span>'; sub = "happy path · touchless"; }
      else {
        var p = window.PIQ.pattern(t.patternId);
        var label = p ? p.name : "pattern";
        if (t.status === "pending") badge = '<span class="rtx-b pend">AWAITING DAG APPROVAL</span>';
        else if (t.status === "approved") badge = '<span class="rtx-b appr">APPROVED ✓</span>';
        else if (t.status === "rejected") badge = '<span class="rtx-b rej">REJECTED ✕</span>';
        else badge = '<span class="rtx-b auto">AUTO-RESOLVED</span>';
        sub = 'matched <b>' + esc(label) + '</b>';
      }
      return '<div class="' + cls + '"><div class="rtx-n">' + t.n + '</div>' +
        '<div class="rtx-main"><div class="rtx-id">' + esc(t.id) + ' · ' + esc(t.entity) +
        '<span class="rtx-amt">' + money(t.amt) + '</span></div>' +
        '<div class="rtx-sub">' + sub + '</div></div>' + badge + '</div>';
    }).join("");
    s.innerHTML = '<div class="rt-streamh">Transaction stream <span class="muted">' + sim.cursor + ' / ' + sim.q.length + ' processed</span></div>' + rows;
    var active = s.querySelector(".s-queued");
    if (active && sim.cursor < sim.q.length) active.classList.add("next");
  }

  function drawApprovals() {
    var a = document.getElementById("rtApprovals"); if (!a) return;
    var pend = sim.q.filter(function (t) { return t.status === "pending"; });
    if (!pend.length) { a.innerHTML = '<div class="ap-empty">No approvals pending. Variations with HITL gates land here for sign-off before the DAG executes.</div>'; return; }
    a.innerHTML = '<div class="ap-h">🔒 DAG approvals <span class="ap-c">' + pend.length + '</span></div>' +
      pend.map(function (t) {
        var p = window.PIQ.pattern(t.patternId), br = p.branchingDAG[t.branchIdx];
        return '<div class="apcard" data-n="' + t.n + '">' +
          '<div class="ap-top"><span class="pat-prio" style="background:' + PRIO[p.priority] + '"></span>' +
          esc(p.name) + '<span class="ap-tx">' + esc(t.id) + '</span></div>' +
          '<div class="ap-cond mono">' + esc(br.condition) + '</div>' +
          '<div class="ap-act">→ ' + esc(window.PIQ.prettify((br.actions || []).join(" + "))) + '</div>' +
          '<div class="ap-gate">🔒 ' + esc(br.hitl) + '</div>' +
          '<div class="ap-btns"><button class="btn go xs" data-act="approve" data-n="' + t.n + '">Approve</button>' +
          '<button class="btn ghost xs" data-act="reject" data-n="' + t.n + '">Reject</button></div></div>';
      }).join("");
    a.querySelectorAll("[data-act]").forEach(function (b) {
      b.onclick = function () { decide(+b.dataset.n, b.dataset.act); };
    });
  }

  function drawFeed() {
    var f = document.getElementById("rtFeed"); if (!f) return;
    if (!sim.log.length) { f.innerHTML = '<div class="feed-h">Activity</div><div class="ap-empty">Press <b>Process next</b> or <b>Auto-run</b> to start the stream.</div>'; return; }
    f.innerHTML = '<div class="feed-h">Activity</div>' + sim.log.slice().reverse().map(function (e) {
      return '<div class="feed-i k-' + e.k + '"><span class="fi-dot"></span>' + e.t + '</div>';
    }).join("");
  }

  /* ---------------- engine ---------------- */
  function step() {
    if (sim.cursor >= sim.q.length) { stopAuto(); return false; }
    var t = sim.q[sim.cursor];
    if (t.kind === "clean") {
      t.status = "stp"; sim.counts.stp++; sim.counts.value += Math.round(t.amt * 0.18);
      logE("stp", esc(t.id) + " cleared <b>straight-through</b> on the happy path — no human touch.");
    } else {
      var p = window.PIQ.pattern(t.patternId);
      if (t.needsApproval) {
        t.status = "pending"; sim.counts.pending++;
        logE("pend", esc(t.id) + " matched <b>" + esc(p.name) + "</b> — routed for DAG approval.");
      } else {
        t.status = "auto"; sim.counts.auto++; sim.counts.value += Math.round(t.amt * 0.12);
        logE("auto", esc(t.id) + " matched <b>" + esc(p.name) + "</b> — branch executed automatically.");
      }
    }
    sim.cursor++;
    repaint();
    return true;
  }

  function decide(n, act) {
    var t = sim.q.filter(function (x) { return x.n === n; })[0]; if (!t || t.status !== "pending") return;
    sim.counts.pending--;
    var p = window.PIQ.pattern(t.patternId);
    if (act === "approve") { t.status = "approved"; sim.counts.approved++; sim.counts.value += Math.round(t.amt * 0.12);
      logE("appr", esc(t.id) + " — <b>" + esc(p.name) + "</b> DAG <b>approved</b>; branch executed.");
    } else { t.status = "rejected"; sim.counts.rejected++;
      logE("rej", esc(t.id) + " — <b>" + esc(p.name) + "</b> DAG <b>rejected</b>; held for review.");
    }
    repaint();
  }

  function logE(k, t) { sim.log.push({ k: k, t: t }); }
  function repaint() { drawStream(); drawApprovals(); drawFeed(); drawKpis(); drawCompound(); }

  function drawCompound() {
    var host = document.getElementById("rtCompound"); if (!host) return;
    var sigs = compoundSignals();
    if (!sigs.length) { host.innerHTML = ""; host.classList.remove("on"); return; }
    host.classList.add("on");
    host.innerHTML = '<div class="rc-h">⚠ Compound Signals <span class="rc-c">' + sigs.length + '</span>' +
      '<small>emergent cross-process risk — no single pattern would catch this</small></div>' +
      '<div class="rc-cards">' + sigs.map(function (s) {
        var cons = s.fired.map(function (id) {
          var p = window.PIQ.pattern(id);
          return '<span class="rc-pat">#' + id + (p ? ' ' + esc(p.name) : '') + '</span>';
        }).join("");
        return '<div class="rc-card">' +
          '<div class="rc-top"><span class="rc-name">' + esc(s.cp.name) + '</span>' +
          (s.entity ? '<span class="rc-ent">' + esc(s.entity) + (s.concentrated ? '' : ' cohort') + '</span>' : '') + '</div>' +
          '<div class="rc-desc">' + esc(s.cp.description) + '</div>' +
          '<div class="rc-cons"><span class="rc-lab">Constituent signals</span>' + cons + '</div>' +
          '<div class="rc-foot"><div class="rc-impact"><b>Compound impact</b>' + esc(s.cp.compoundImpact) + '</div>' +
          '<div class="rc-resp"><b>Response</b>' + esc(s.cp.response) + '</div></div></div>';
      }).join("") + '</div>';
  }

  /* ---------------- controls ---------------- */
  function wireControls(root) {
    root.querySelector("#rtStep").onclick = function () { stopAuto(); step(); };
    root.querySelector("#rtAuto").onclick = function () { toggleAuto(this); };
    root.querySelector("#rtReset").onclick = function () { stopAuto(); ensureSim(true); repaint(); };
  }
  function toggleAuto(btn) {
    if (timer) { stopAuto(); btn.textContent = "Auto-run ⏵"; btn.classList.remove("on"); return; }
    btn.textContent = "Pause ⏸"; btn.classList.add("on");
    timer = setInterval(function () { if (!step()) { var b = document.getElementById("rtAuto"); if (b) { b.textContent = "Auto-run ⏵"; b.classList.remove("on"); } } }, 850);
  }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }

  window.PIQ.modules.runtime = { render: render };
  window.PIQ.onErp(function () { if (window.PIQ.active === "runtime") { var v = document.getElementById("view"); v.innerHTML = ""; render(v); } });
})();

    var tchips = tables.map(function (t) { return '<span class="tbl">' + esc(t) + '</span>'; }).join("");

    // branching DAG tree
    var branches = (p.branchingDAG || []).map(function (b) {
      var verbs = b.actions.map(function (a) { return '<span class="verb">' + esc(a) + '</span>'; }).join("");
      var hitl = b.hitl ? '<div class="b-hitl">🔒 HITL: ' + esc(b.hitl) + '</div>' : "";
      return '<div class="branch t-' + b.tier + '"><div class="b-cond mono">' + esc(b.condition) + '</div>' +
        '<div class="b-acts">' + verbs + '</div>' + hitl + '</div>';

    var flat = p.originalDAG.map(function (s) { return '<span class="verb flat">' + esc(s) + '</span>'; }).join('<span class="arr">→</span>');
    var tiv = triggerInvoice(p);
    var liveLink = tiv ? '<button class="btn go sm" id="toCockpit">See it live in the Cognitive Cockpit →</button>' : '';

    d.innerHTML =
      '<div class="d-head"><div class="pnum lg" style="background:' + PRIO[p.priority] + '">' + p.id + '</div>' +
      '<div><h2 style="font-size:21px;margin:0">' + esc(p.name) + '</h2>' +
      '<div class="cat">' + esc(p.category) + '</div>' +
      '<span class="badge" style="background:' + PRIO[p.priority] + '">' + p.priority + ' priority</span>' +
      '<span class="badge ghost mono">' + esc(p.layer3_feature) + '</span></div></div>' +

      '<div class="mental">“' + esc(p.mentalModel) + '”<span class="who">— the analyst\'s mental model</span></div>' +

      '<div class="d-grid">' +
        layer("1", "Logical Mapping", esc(p.layer1_logicalMapping), '<div class="tables">' + tchips + '</div>') +
        layer("2", "Event Series", esc(p.layer2_eventSeries), "") +
        layer("3", "AI Feature", '<b>' + esc(p.layer3_feature) + '</b> — pre-calculated expert trigger', '<pre class="sql">' + esc(p.conceptualSQL) + '</pre>') +
      '</div>' +

      '<div class="d-sec"><h4>Original Action DAG <span class="muted">flat sequence</span></h4><div class="flatdag">' + flat + '</div></div>' +

      '<div class="d-sec"><h4>Branching DAG <span class="muted">conditional decision tree for agentic orchestration</span></h4>' +
      '<div class="branches">' + branches + '</div></div>' +
      (p.hitlGates.length ? '<div class="gatebar">🔒 HITL gates: ' + p.hitlGates.map(esc).join(" · ") + '</div>' : '') +
      liveLink;

    var btn = document.getElementById("toCockpit");
    if (btn) btn.onclick = function () {
      window.PIQ._jumpInvoice = tiv.belnr;

  function layer(n, title, desc, extra) {
    return '<div class="dlayer"><div class="lh"><span class="ln">' + n + '</span>' + title + '</div>' +

  function wire(root) {
    var s = root.querySelector("#libSearch");
    s.oninput = function () { state.q = s.value; renderList(); };
    root.querySelector("#catChips").onclick = function (e) {
      var b = e.target.closest("[data-cat]"); if (!b) return;

      renderList();

    root.querySelector("#prioChips").onclick = function (e) {

      renderList();

    root.querySelectorAll(".mx").forEach(function (m) {

        state.cat = state.cat === m.dataset.cat ? "All" : m.dataset.cat;
        render(document.getElementById("view"));
      };
    });
  }

  window.PIQ.modules.library = { render: render };
  window.PIQ.onErp(function () { if (window.PIQ.active === "library") renderDetail(); });
})();

/* ProcessIQ — Action & Governance (Module 4)
 * Deck slides 13-14: the brain decides, pre-built deterministic blocks execute.
 *  - Interactive Action-DAG execution simulator with live Saga rollback
 *  - The three trust modes (Assisted -> Policy-Approved -> Autonomous)
 *  - The four enterprise governance guarantees */
(function () {
  "use strict";
  var E = window.ProcessIQEngine;
  var patterns = window.PIQ.patterns;

  // patterns whose flat DAG has >=2 mutating steps make the best Saga demos
  function dagSteps(p) {
    return (p.originalDAG || []).map(function (v) { return E.classifyAction(v); });
  }
  function writeCount(p) { return dagSteps(p).filter(function (s) { return s.mutating; }).length; }

  var state = {
    mode: "assisted",        // assisted | policy | autonomous
    patId: pickDefault(),
    injectFail: false,
    failStep: 2,             // 1-indexed
    run: null,               // execution state per step
  };
  function pickDefault() {
    var best = patterns.slice().sort(function (a, b) { return writeCount(b) - writeCount(a); });
    return best[0].id;
  }
  function pat() { return patterns.filter(function (p) { return p.id === state.patId; })[0]; }
  function el(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h != null) n.innerHTML = h; return n; }
  function esc(s) { return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  var MODES = {
    supervised: {
      label: "Supervised", tag: "DAY 1", color: "#c0392b",
      blurb: "Nothing runs without a human. Every action — including read-only lookups — is queued for explicit approval before it executes. This is day one of a deployment, before the system has earned any trust.",
      bullets: ["Every action requires human approval", "READ and WRITE steps alike are gated", "No autonomous execution — full oversight", "Establishes the audit baseline", "Trust is earned from here, not assumed"],
      gate: function () { return true; },  // everything gated — reads included
    },
    assisted: {
      label: "Cautious", tag: "EARLY", color: "var(--sense)",
      blurb: "Read-only lookups run automatically; every WRITE to the ERP is queued for human approval. The AI detects, evidences, and drafts the action payload — a human authorizes anything that changes a record.",
      bullets: ["Reads & lookups run automatically", "Every WRITE queued for approval", "AI drafts the action payload", "Human authorizes state changes", "Full audit trail"],
      gate: function (step) { return step.mutating; },  // gate writes; auto on reads
    },
    policy: {
      label: "Balanced", tag: "EARNED", color: "var(--decide)",
      blurb: "Standing authorization for low-risk, reversible actions. CFO + Controller approve the POLICY (versioned, effective-dated); the system applies within bounds and gates only the rest.",
      bullets: ["Standing authorization for low-risk, reversible actions", "Policy versioned & effective-dated", "CFO + Controller approve the POLICY", "System applies automatically within bounds", "Audit trail for every execution"],
      gate: function (step) { return step.mutating && step.highRisk; },  // gate only high-risk writes
    },
    autonomous: {
      label: "Autonomous", tag: "MATURE", color: "var(--act)",
      blurb: "Full closed-loop execution — only after calibration proves accuracy. Outcome attribution validates every action; underperforming patterns are flagged; rollback is always available.",
      bullets: ["Full closed-loop execution", "Only after calibration proves accuracy", "Outcome attribution validates every action", "Underperforming patterns flagged", "Rollback always available", "Cryptographic audit log"],
      gate: function () { return false; },  // nothing gated
    },
  };

  // a write step is "high-risk" if it touches credit/delivery/legal/portal
  var HIGH_RISK = /Delivery_Block|Legal|Credit_Review|Reduce_Credit|Disable|Mandate_Prepayment|CFO/i;

  function buildRun() {
    var steps = dagSteps(pat()).map(function (s, i) {
      return {
        i: i, verb: s.verb, mutating: s.mutating, compensable: s.compensable,
        highRisk: s.mutating && HIGH_RISK.test(s.verb),
        status: "idle",  // idle | gated | running | committed | failed | rolledback
      };
    });
    steps.forEach(function (s) { if (MODES[state.mode].gate(s)) s.status = "gated"; });
    return steps;
  }

  /* ---------------- render ---------------- */
  function render(view) {
    state.run = buildRun();
    view.innerHTML = '<div class="gov"></div>';
    var root = view.querySelector(".gov");

    root.appendChild(headerEl());
    root.appendChild(modeStrip());

    var grid = el("div", "gov-grid");
    grid.appendChild(simulatorCard());
    grid.appendChild(guaranteesCard());
    root.appendChild(grid);
    wireControls(root);
    paintSteps();
  }

  function headerEl() {
    return el("div", "gov-head",
      '<div class="kv">From Decision to Action · deck slides 13–14</div>' +
      '<h2 style="font-size:22px;margin:2px 0 4px">Brain and Hands Are Separated</h2>' +
      '<p style="margin:0;color:var(--muted);max-width:760px">The AI decides <em>which</em> counter-strategy to run. Pre-built, tested, versioned API blocks do the executing. The AI never writes free-form code into SAP — it composes governed, rollback-ready blocks.</p>');
  }

  /* trust-mode selector */
  function modeStrip() {
    var wrap = el("div", "modestrip");
    var tabs = Object.keys(MODES).map(function (k, i) {
      var m = MODES[k];
      return '<button class="modecard' + (state.mode === k ? " on" : "") + '" data-mode="' + k + '" style="--mc:' + m.color + '">' +
        '<div class="mt"><span class="mtag">' + m.tag + '</span> Mode ' + (i + 1) + '</div>' +
        '<div class="mname">' + m.label + '</div>' +
        '<div class="mblurb">' + esc(m.blurb) + '</div></button>';
    }).join("");
    wrap.innerHTML = '<div class="modetabs">' + tabs + '</div>' +
      '<div class="trustline"><span>Human-in-the-Loop by default</span><div class="tarrow"></div><span>Autonomous by earned trust</span></div>';
    return wrap;
  }

  /* ---- DAG execution simulator ---- */
  function simulatorCard() {
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">▸</span>Action DAG — Execution Simulator</h4>';
    var pad = el("div", "pad");
    var opts = patterns.slice().sort(function (a, b) { return writeCount(b) - writeCount(a); })
      .map(function (p) { return '<option value="' + p.id + '"' + (p.id === state.patId ? " selected" : "") + '>#' + p.id + ' · ' + esc(p.name) + '</option>'; }).join("");
    pad.innerHTML =
      '<div class="simbar"><select id="simPat" class="search" style="flex:1">' + opts + '</select></div>' +
      '<div class="simctrl">' +
        '<button class="btn go sm" id="simRun">▶ Execute DAG</button>' +
        '<button class="btn ghost sm" id="simReset">Reset</button>' +
        '<label class="failtog"><input type="checkbox" id="simFail"' + (state.injectFail ? " checked" : "") + '/> Inject failure at step <select id="simFailStep"></select></label>' +
      '</div>' +
      '<div class="execdag" id="execDag"></div>' +
      '<div class="simlog" id="simLog"></div>';
    card.appendChild(pad);
    return card;
  }

  function paintSteps() {
    var host = document.getElementById("execDag"); if (!host) return;
    host.innerHTML = state.run.map(function (s) {
      var cls = "estep st-" + s.status;
      var badge = s.mutating ? '<span class="sg' + (s.highRisk ? " hr" : "") + '">' + (s.highRisk ? "HIGH-RISK WRITE" : "WRITE · ↺ SAGA") + '</span>'
        : '<span class="sg read">READ / NOTIFY</span>';
      var icon = { idle: "○", gated: "🔒", running: "◐", committed: "✓", failed: "✕", rolledback: "↺" }[s.status];
      return '<div class="' + cls + '"><span class="ei">' + icon + '</span>' +
        '<div class="ev"><span class="evn mono">' + esc(s.verb) + '</span>' + badge + '</div></div>';
    }).join("");
    // failstep options
    var sel = document.getElementById("simFailStep");
    if (sel && sel.options.length !== state.run.length) {
      sel.innerHTML = state.run.map(function (s, i) { return '<option value="' + (i + 1) + '"' + ((i + 1) === state.failStep ? " selected" : "") + '>' + (i + 1) + '</option>'; }).join("");
    }
  }

  function log(msg, kind) {
    var l = document.getElementById("simLog"); if (!l) return;
    var row = el("div", "logrow" + (kind ? " " + kind : ""), msg);
    l.appendChild(row); l.scrollTop = l.scrollHeight;
  }

  function execute() {
    state.run = buildRun();
    paintSteps();
    document.getElementById("simLog").innerHTML = "";
    var mode = MODES[state.mode];
    log("Mode: <b>" + mode.label + "</b> — " + (state.mode === "assisted" ? "all steps queued for human approval" : state.mode === "policy" ? "low-risk steps auto-apply; high-risk gated" : "full closed-loop, attribution on"), "muted");

    var i = 0, committed = [];
    function next() {
      if (i >= state.run.length) { log("✓ DAG complete — outcome attribution recording.", "ok"); return; }
      var s = state.run[i];
      if (s.status === "gated") {
        log("🔒 Step " + (i + 1) + " <b>" + s.verb + "</b> — awaiting human approval (" + mode.label + ")", "gate");
        i++; return setTimeout(next, 420);
      }
      s.status = "running"; paintSteps();
      setTimeout(function () {
        var willFail = state.injectFail && (i + 1) === state.failStep;
        if (willFail) {
          s.status = "failed"; paintSteps();
          log("✕ Step " + (i + 1) + " <b>" + s.verb + "</b> FAILED (ERP record locked / API error)", "err");
          return rollback(committed);
        }
        s.status = "committed"; paintSteps();
        if (s.compensable) committed.push(s);
        log((s.mutating ? "✓ Committed: " : "✓ Done: ") + "<b>" + s.verb + "</b>" + (s.mutating ? " (compensating step registered)" : ""), "ok");
        i++; setTimeout(next, 520);
      }, 560);
    }
    next();
  }

  // Saga: on failure, compensate previously-committed writes in reverse order.
  function rollback(committed) {
    if (!committed.length) { log("No prior writes to compensate. System consistent. SAP untouched beyond the failed call.", "muted"); return; }
    log("↺ Saga triggered — rolling back " + committed.length + " committed write(s) in reverse:", "warn");
    var k = committed.length - 1;
    (function undo() {
      if (k < 0) { log("↺ Rollback complete — ledger restored to pre-DAG state. No partial execution, no corruption.", "warn"); return; }
      var s = committed[k];
      s.status = "rolledback"; paintSteps();
      log("   ↺ Compensated: <b>" + s.verb + "</b>", "warn");
      k--; setTimeout(undo, 480);
    })();
  }

  /* ---- governance guarantees ---- */
  function guaranteesCard() {
    var wrap = el("div");
    var card = el("div", "card");
    card.innerHTML = '<h4><span class="num">⊕</span>Enterprise-Grade Governance</h4>';
    var pad = el("div", "pad");
    var G = [
      ["↺", "Saga Pattern", "Every multi-step DAG has compensating transactions. Step 3 fails → steps 2 & 1 auto-rollback. Try it in the simulator."],
      ["⟳", "Idempotent Retry", "Locked ERP records trigger wait-and-retry, not failure. Re-running a step never double-posts."],
      ["⊕", "System of Record", "SAP / Oracle remains the system of record — always. The AI operates strictly within ERP boundaries."],
      ["⊘", "No Hallucination", "Deterministic, versioned API blocks — not generated code. The AI never touches the ERP without governance."],
    ];
    pad.innerHTML = '<div class="guars">' + G.map(function (g) {
      return '<div class="guar"><div class="gi">' + g[0] + '</div><div><div class="gn">' + g[1] + '</div><div class="gd">' + esc(g[2]) + '</div></div></div>';
    }).join("") + '</div>';
    card.appendChild(pad);
    wrap.appendChild(card);

    // current-mode characteristics
    var m = MODES[state.mode];
    var mc = el("div", "card"); mc.style.marginTop = "18px";
    mc.innerHTML = '<h4><span class="num" style="background:' + m.color + '">' + m.tag.charAt(0) + '</span>' + m.label + ' Mode</h4>' +
      '<div class="pad"><ul class="modelist">' + m.bullets.map(function (b) { return '<li>' + esc(b) + '</li>'; }).join("") + '</ul></div>';
    wrap.appendChild(mc);
    return wrap;
  }

  /* ---- controls ---- */
  function wireControls(root) {
    root.querySelector(".modetabs").onclick = function (e) {
      var b = e.target.closest("[data-mode]"); if (!b) return;
      state.mode = b.dataset.mode;
      render(document.getElementById("view"));
    };
    document.getElementById("simPat").onchange = function () { state.patId = +this.value; state.run = buildRun(); paintSteps(); document.getElementById("simLog").innerHTML = ""; };
    document.getElementById("simRun").onclick = execute;
    document.getElementById("simReset").onclick = function () { state.run = buildRun(); paintSteps(); document.getElementById("simLog").innerHTML = ""; };
    document.getElementById("simFail").onchange = function () { state.injectFail = this.checked; };
    var fs = document.getElementById("simFailStep");
    if (fs) fs.onchange = function () { state.failStep = +this.value; };
  }

  window.PIQ.modules.governance = { render: render };
})();

      originalDAG: ["Read_Payment_Behaviour", "Detect_" + cand.proposedFeature, "Score_Seasonal_Anomaly"]
        .concat(primary.actions || []),
      branchingDAG: branches, hitlGates: gates,
      calibration: { defaultThreshold: "0-2 days", calibratedThreshold: "0-30 days",
        traceCount: 14000, additionalCoverage: cand.affectedCustomers || 14, method: "PM4Py conformance analysis" },
    };
    window.PIQ.patterns.push(pat);
    window.PIQ._actionRepo = null;   // invalidate the cached action-block repository

    var meta = window.PIQ.meta;
    if (meta) {
      meta.patternCount = window.PIQ.patterns.length;
      var catRow = (meta.categories || []).filter(function (c) { return c.category === pat.category; })[0];
      if (catRow) { catRow.count++; catRow[pat.priority] = (catRow[pat.priority] || 0) + 1; }
    }
    // attach to the O2C Credit & Risk objective so the Studio surfaces it
    var o2c = (window.PIQ.tax.functions || []).filter(function (f) { return f.id === "o2c"; })[0];
    if (o2c) o2c.processes.forEach(function (pr) { pr.roles.forEach(function (r) { (r.objectives || []).forEach(function (o) {
      if (o.id === "o2c-o-risk" && o.patternIds.indexOf(pat.id) < 0) {
        o.patternIds.push(pat.id); o.patternCount = o.patternIds.length; o2c.patternCount = (o2c.patternCount || 0) + 1;
      }
    }); }); });
  }

  function toast(msg) {
    var t = document.createElement("div");
    t.className = "piq-toast"; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.classList.add("show"); }, 10);
    setTimeout(function () { t.classList.remove("show"); }, 2600);
    setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
  }

  function setActiveLoop(active) {
    D.loop.forEach(function (s) {
      var n = document.getElementById("lstep" + s.step);
      if (!n) return;
      n.classList.toggle("on", s.step === active);
      n.classList.toggle("done", s.step < active);
    });
  }

  window.PIQ.modules.discovery = { render: render };
})();

</script>
<script>window.PIQ.boot();</script>
</body>
